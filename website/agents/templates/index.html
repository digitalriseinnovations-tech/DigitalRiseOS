<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Employee Templates — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .tp-card { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:20px;transition:all .18s; }
    .tp-card:hover { transform:translateY(-2px);box-shadow:var(--shadow-md); }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content" id="content"></main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'templates' });

var deployed = DRS.list('agents');
var h = DRUI.pageHeader('AI Employee Templates',
  'Every role your AI team can fill — with industry-specific versions for each business type.',
  '<a class="btn btn--primary" href="/agents/businesses/new">+ Add to a Business</a>');

h += '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:12px">Core AI employees (all industries)</div>';
h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px">' +
  DRD.agentTypes.map(function(a){
    var count = deployed.filter(function(d){ return d.agentType===a.type; }).length;
    return '<div class="tp-card">' +
      '<div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">' +
      '<div style="width:40px;height:40px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:1.25rem">'+a.icon+'</div>' +
      '<div><div style="font-size:.875rem;font-weight:800;color:var(--t1)">'+a.name+'</div>' +
      '<div style="font-size:.625rem;color:var(--t4)">'+a.channels.join(', ')+' · deployed '+count+'×</div></div></div>' +
      '<div style="font-size:.75rem;color:var(--t3);line-height:1.55">'+a.desc+'</div></div>';
  }).join('') + '</div>';

h += '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:12px">Industry-specific AI employees</div>';
h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">' +
  DRD.industryGroups.map(function(g){
    var ov = DRD.industryOverlays[g.id] || { extra: [] };
    return (ov.extra||[]).map(function(a){
      var count = deployed.filter(function(d){ return d.agentType===a.type; }).length;
      return '<div class="tp-card">' +
        '<div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">' +
        '<div style="width:40px;height:40px;border-radius:10px;background:'+g.color+'18;display:flex;align-items:center;justify-content:center;font-size:1.25rem">'+a.icon+'</div>' +
        '<div><div style="font-size:.875rem;font-weight:800;color:var(--t1)">'+a.name+'</div>' +
        '<div style="font-size:.625rem;color:var(--t4)">'+g.icon+' '+g.label+' · deployed '+count+'×</div></div></div>' +
        '<div style="font-size:.75rem;color:var(--t3);line-height:1.55">'+a.desc+'</div></div>';
    }).join('');
  }).join('') + '</div>';

document.getElementById('content').innerHTML = h;
</script>
</body>
</html>
