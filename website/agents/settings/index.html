<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .st-row { display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-s);gap:16px; }
    .st-row:last-child { border:none; }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content" id="content"></main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'settings' });

function render() {
  var counts = ['businesses','agents','leads','conversations','bookings','reviews'].map(function(c){
    return c+': '+DRS.list(c).length;
  }).join(' · ');

  var h = DRUI.pageHeader('Settings','Platform configuration and data management');

  h += '<div class="ag-card" style="padding:24px;margin-bottom:16px">' +
    '<div style="font-size:.875rem;font-weight:800;color:var(--t1);margin-bottom:4px">Appearance</div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Theme</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">Light mode is default; dark mode available.</div></div>' +
    '<button class="btn btn--ghost" onclick="AG.toggleTheme();AG.toast(\'Theme switched\',\'success\')">🌓 Toggle Theme</button></div></div>';

  h += '<div class="ag-card" style="padding:24px;margin-bottom:16px">' +
    '<div style="font-size:.875rem;font-weight:800;color:var(--t1);margin-bottom:4px">Data & Storage</div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Storage driver</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">Currently <b>localStorage</b> (browser). Supabase cloud sync is structured and ready — it will replace this without changing any pages.</div></div>' +
    '<span class="badge badge--amber">local</span></div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Stored records</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">'+counts+'</div></div></div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Reset demo data</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">Clears everything and re-seeds the two demo businesses. Cannot be undone.</div></div>' +
    '<button class="btn btn--danger" onclick="resetData()">🗑 Reset All Data</button></div></div>';

  h += '<div class="ag-card" style="padding:24px">' +
    '<div style="font-size:.875rem;font-weight:800;color:var(--t1);margin-bottom:4px">AI Engine</div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Tester & widget engine</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">Rule-based knowledge matching (no API key needed). The live chat API already supports Claude — set per-agent engines in a later phase.</div></div>' +
    '<span class="badge badge--blue">rule-based</span></div>' +
    '<div class="st-row"><div><div style="font-size:.8125rem;font-weight:600;color:var(--t1)">Client access</div>' +
    '<div style="font-size:.75rem;color:var(--t3)">Clients viewing their own AI employees — planned for a future phase. Platform is admin-first today.</div></div>' +
    '<span class="badge badge--gray">planned</span></div></div>';

  document.getElementById('content').innerHTML = h;
}
window.resetData = function(){
  if (!confirm('Reset ALL platform data? This clears every business, agent, lead, conversation, booking and review.')) return;
  DRS.clearAll();
  DRS.seed();
  AG.toast('Data reset — demo businesses re-seeded','success');
  setTimeout(function(){ location.reload(); }, 800);
};
render();
</script>
</body>
</html>
