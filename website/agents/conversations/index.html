<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversations — Digital Rise AI Employees</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .inbox-layout { display:grid;grid-template-columns:340px 1fr;gap:0;height:calc(100vh - 56px - 90px);min-height:400px;border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--card); }
    @media(max-width:800px){.inbox-layout{grid-template-columns:1fr;height:auto}}
    .inbox-list { border-right:1.5px solid var(--border);overflow-y:auto; }
    .inbox-filters { padding:12px 14px;border-bottom:1.5px solid var(--border);display:flex;gap:6px;flex-wrap:wrap; }
    .conv-item { padding:14px 16px;border-bottom:1px solid var(--border-s);cursor:pointer;transition:background .1s; }
    .conv-item:hover { background:var(--accent-bg); }
    .conv-item.is-active { background:var(--accent-bg);border-left:3px solid var(--accent); }
    .conv-name { font-size:.875rem;font-weight:700;color:var(--t1); }
    .conv-preview { font-size:.75rem;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .conv-meta { display:flex;align-items:center;justify-content:space-between;margin-bottom:4px; }
    .conv-time { font-size:.6875rem;color:var(--t4); }
    .conv-detail { display:flex;flex-direction:column;height:100%; }
    .conv-detail-hd { padding:16px 20px;border-bottom:1.5px solid var(--border); }
    .conv-detail-body { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px; }
    .conv-empty { display:flex;align-items:center;justify-content:center;height:100%;color:var(--t4);flex-direction:column;gap:8px; }
    .msg-bubble { max-width:75%;border-radius:12px;padding:10px 14px;font-size:.8125rem;line-height:1.5; }
    .msg-in  { background:var(--border-s);color:var(--t1);align-self:flex-start;border-bottom-left-radius:4px; }
    .msg-out { background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px; }
    .msg-label { font-size:.625rem;color:var(--t4);margin-bottom:2px; }
    .msg-label.out { text-align:right; }
    .conv-detail-ft { padding:14px 16px;border-top:1.5px solid var(--border);display:flex;gap:8px; }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content">

      <div class="ag-ph">
        <div>
          <div class="ag-ph-title">Conversations</div>
          <div class="ag-ph-sub">Unified AI inbox across all businesses and channels</div>
        </div>
        <div class="ag-ph-actions">
          <select class="ag-select" id="convBizFilter" style="width:180px" onchange="renderConvList()">
            <option value="">All Businesses</option>
          </select>
        </div>
      </div>

      <div class="inbox-layout">
        <div class="inbox-list">
          <div class="inbox-filters" id="convStatusFilters">
            <button class="btn btn--ghost btn--sm is-active" data-csf="all"      onclick="filterConv('all',this)">All</button>
            <button class="btn btn--ghost btn--sm" data-csf="active"    onclick="filterConv('active',this)">Active</button>
            <button class="btn btn--ghost btn--sm" data-csf="pending"   onclick="filterConv('pending',this)">Pending</button>
            <button class="btn btn--ghost btn--sm" data-csf="resolved"  onclick="filterConv('resolved',this)">Resolved</button>
          </div>
          <div id="convList"></div>
        </div>
        <div class="conv-detail" id="convDetail">
          <div class="conv-empty" id="convEmpty">
            <div style="font-size:2rem">💬</div>
            <div style="font-size:.875rem;font-weight:600;color:var(--t3)">Select a conversation</div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents.js"></script>
<script>
AG.init({ page: 'conversations' });

AD.businesses.forEach(function(b){
  var o=document.createElement('option');o.value=b.id;o.textContent=b.name;
  document.getElementById('convBizFilter').appendChild(o);
});

var _csf = 'all';
var _activeCid = null;

function filterConv(f, btn) {
  if(btn){ document.querySelectorAll('[data-csf]').forEach(function(b){b.classList.remove('is-active');}); btn.classList.add('is-active'); }
  _csf = f||_csf;
  renderConvList();
}
window.filterConv = filterConv;

function renderConvList() {
  var bizF = document.getElementById('convBizFilter').value;
  var list = AD.conversations.filter(function(c){
    if(_csf!=='all' && c.status!==_csf) return false;
    if(bizF && c.bizId!==bizF) return false;
    return true;
  });
  var statusDot = {active:'var(--green)',pending:'var(--amber)',resolved:'var(--border)',sent:'var(--blue)'};
  document.getElementById('convList').innerHTML = list.map(function(c){
    return '<div class="conv-item'+(c.id===_activeCid?' is-active':'')+'" id="ci_'+c.id+'" onclick="openConv(\''+c.id+'\')">' +
      '<div class="conv-meta">' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<div style="width:8px;height:8px;border-radius:50%;background:'+(statusDot[c.status]||'var(--border)')+';flex-shrink:0"></div>' +
          '<div class="conv-name">'+c.name+'</div>' +
        '</div>' +
        '<div class="conv-time">'+c.time+'</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+AG.chBadge(c.channel)+'<span style="font-size:.6875rem;color:var(--t4)">via '+c.employee+'</span></div>' +
      '<div class="conv-preview">'+c.preview+'</div>' +
      '<div style="font-size:.5625rem;font-weight:700;color:var(--t4);margin-top:4px;text-transform:uppercase">'+c.biz+'</div>' +
    '</div>';
  }).join('');
  if(!list.length) document.getElementById('convList').innerHTML='<div style="padding:24px;text-align:center;color:var(--t4);font-size:.8125rem">No conversations found</div>';
}
renderConvList();

var SAMPLE_THREADS = {
  c1:[ {in:true,  text:"Hi! I'm looking for a spot for my 2-year-old daughter starting September. Do you have availability?"}, {in:false, text:"Hi Sarah! Thanks for reaching out to Sunshine Nursery 🌞 We do have limited spots for our Toddler Room (18m–3yrs) starting September. Would you like to book a quick tour so you can see the space and meet our team?"}, {in:true, text:"That would be wonderful! When are tours available?"}, {in:false, text:"We run tours Monday to Friday at 10am and 2pm. I can book you in for any day that works! What's your preferred date?"} ],
  c2:[ {in:true,  text:"I'd like to book a consultation for teeth whitening. Are you accepting new patients?"}, {in:false, text:"Hi James! Smile Dental Studio is absolutely accepting new patients 😊 Teeth whitening consultations are complimentary. I have slots available this week — Thursday at 2pm works great. Shall I book that for you?"}, {in:true, text:"Thursday 2pm is perfect, thank you."}, {in:false, text:"Done! Your consultation is booked for Thursday July 10 at 2:00 PM. You'll receive a confirmation SMS shortly. See you then! 😊"} ],
  c4:[ {in:true,  text:"Hi! I'd like to book a gel manicure for Saturday if possible?"}, {in:false, text:"Hi Emma! 💅 We have Saturday July 12 at 11am or 1pm available for a gel manicure. Which works best for you?"}, {in:true, text:"11am please!"}, {in:false, text:"Booked! Gel Manicure for Saturday July 12 at 11:00 AM with Luna. We'll send a reminder Friday. See you soon! ✨"} ],
};

window.openConv = function(id) {
  _activeCid = id;
  document.querySelectorAll('.conv-item').forEach(function(el){el.classList.remove('is-active');});
  var ci = document.getElementById('ci_'+id);
  if(ci) ci.classList.add('is-active');
  var c = AD.conversations.find(function(x){return x.id===id;});
  if(!c) return;
  var thread = SAMPLE_THREADS[id]||[{in:true,text:c.preview}];
  document.getElementById('convDetail').innerHTML =
    '<div class="conv-detail-hd">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
        '<div><div style="font-size:.9375rem;font-weight:700;color:var(--t1)">'+c.name+'</div>' +
          '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">'+AG.chBadge(c.channel)+AG.statusBadge(c.status)+'<span style="font-size:.75rem;color:var(--t3)">via '+c.employee+'</span></div>' +
        '</div>' +
        '<div style="font-size:.75rem;color:var(--t4);text-align:right"><div>'+c.biz+'</div><div>'+c.topic+'</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="conv-detail-body">'+thread.map(function(m){
      return '<div><div class="msg-label'+(m.in?'':' out')+'">'+(m.in?c.name:c.employee+' (AI)')+'</div><div class="msg-bubble '+(m.in?'msg-in':'msg-out')+'">'+m.text+'</div></div>';
    }).join('')+'</div>' +
    '<div class="conv-detail-ft">' +
      '<button class="btn btn--ghost btn--sm" onclick="AG.toast(\'Snoozed for 1 hour\',\'info\')">💤 Snooze</button>' +
      '<button class="btn btn--ghost btn--sm" onclick="AG.toast(\'Marked resolved\',\'success\')">✅ Resolve</button>' +
      '<button class="btn btn--primary btn--sm" style="margin-left:auto" onclick="AG.toast(\'Taking over conversation…\',\'info\')">👋 Take Over</button>' +
    '</div>';
};
</script>
</body>
</html>
