<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Digital Rise AI Employee Suite</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .dash-hero {
      background: linear-gradient(120deg, #4F46E5 0%, #6366F1 55%, #8B5CF6 100%);
      border-radius: var(--radius-xl); padding: 26px 28px; margin-bottom: 22px;
      color: #fff; position: relative; overflow: hidden;
    }
    .dash-hero::before {
      content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px;
      border-radius:50%; background:rgba(255,255,255,.08);
    }
    .hero-pill { display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:4px 12px;font-size:.6875rem;font-weight:700;margin:0 6px 6px 0; }
    .hero-dot { width:6px;height:6px;border-radius:50%;background:#4ADE80; }
    .biz-row { cursor:pointer;transition:background .12s; }
    .biz-row:hover { background:var(--bg-alt); }
    .dash-cols { display:grid;grid-template-columns:1.4fr 1fr;gap:16px; }
    @media(max-width:900px){ .dash-cols{grid-template-columns:1fr} }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content" id="content"></main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'dashboard' });

function render() {
  var businesses = DRS.list('businesses');
  var agents = DRS.list('agents');
  var leads = DRS.list('leads');
  var convs = DRS.list('conversations');
  var bookings = DRS.list('bookings');
  var reviews = DRS.list('reviews');
  var ready = agents.filter(function(a){return a.trainingStatus==='ready';}).length;
  var hr = new Date().getHours();
  var greet = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';

  var tasksDone = agents.reduce(function(s,a){ return s + (a.tasksCompleted||0); }, 0);
  var h = '<div class="dash-hero">' +
    '<div style="font-size:1.5rem;font-weight:800;letter-spacing:-.01em;position:relative">'+greet+', Digital Rise 👋</div>' +
    '<div style="font-size:.8438rem;opacity:.85;margin:6px 0 14px;position:relative">Your AI employees are supporting '+businesses.length+' business'+(businesses.length===1?'':'es')+' — answering instantly, following up, and handing off to staff when it matters.</div>' +
    '<div style="position:relative">' +
      '<span class="hero-pill"><span class="hero-dot"></span>'+agents.length+' AI employees on the team</span>' +
      '<span class="hero-pill"><span class="hero-dot"></span>'+ready+' trained & ready</span>' +
      '<span class="hero-pill">✅ '+(tasksDone+leads.length)+' tasks handled</span>' +
      '<span class="hero-pill">📅 '+bookings.length+' bookings supported</span>' +
    '</div>' +
    '<div style="margin-top:16px;position:relative;display:flex;gap:10px;flex-wrap:wrap">' +
      '<a class="btn" href="/agents/businesses/new" style="background:#fff;color:var(--accent-d);font-weight:700">+ Add Business</a>' +
      '<a class="btn" href="/agents/businesses" style="background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)">View Businesses</a>' +
    '</div></div>';

  h += DRUI.kpiRow([
    { ico:'🏢', val:businesses.length, label:'Businesses Supported', bg:'var(--accent-bg)' },
    { ico:'🤖', val:agents.length, label:'AI Employees Working', bg:'var(--green-bg)' },
    { ico:'🎯', val:leads.length, label:'Enquiries Captured', bg:'#FEF3C7' },
    { ico:'💬', val:convs.length, label:'Conversations Handled', bg:'#FDF2F8' },
    { ico:'📅', val:bookings.length, label:'Bookings Supported', bg:'#EEF2FF' },
    { ico:'⭐', val:reviews.length, label:'Reviews Supported', bg:'#FFF7ED' },
  ]);

  /* Setup alerts: untrained agents */
  var untrained = agents.filter(function(a){return a.trainingStatus!=='ready';});
  if (untrained.length) {
    var byBiz = {};
    untrained.forEach(function(a){ byBiz[a.businessId] = (byBiz[a.businessId]||0)+1; });
    Object.keys(byBiz).forEach(function(bid){
      var b = DRS.get('businesses', bid);
      if (!b) return;
      h += '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--radius-lg);padding:13px 18px;margin-bottom:10px;font-size:.8125rem;color:#92400E;display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
        '<span>⚠️</span><span style="flex:1"><b>'+DRUI.esc(b.name)+'</b> has '+byBiz[bid]+' untrained agent'+(byBiz[bid]===1?'':'s')+' — they can\'t answer customers yet.</span>' +
        '<a class="btn btn--sm" style="background:#92400E;color:#fff" href="'+DRUI.bizUrl(b.slug,'agents')+'">Fix Now →</a></div>';
    });
  }

  h += '<div class="dash-cols">';

  /* Business leaderboard */
  h += '<div class="ag-card" style="padding:0;overflow:hidden">' +
    '<div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">' +
    '<span style="font-size:.875rem;font-weight:800;color:var(--t1)">Businesses</span>' +
    '<a class="btn btn--ghost btn--sm" href="/agents/businesses">View all →</a></div>';
  if (!businesses.length) {
    h += '<div style="padding:30px;text-align:center;font-size:.8125rem;color:var(--t4)">No businesses yet — add your first one!</div>';
  }
  businesses.slice(0,6).forEach(function(b){
    var s = DRA.bizStats(b.id);
    h += '<div class="biz-row" style="display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border-s)" onclick="location.href=\'/agents/businesses/'+b.slug+'\'">' +
      AG.bizAv(b) +
      '<div style="flex:1;min-width:0"><div style="font-size:.8125rem;font-weight:700;color:var(--t1)">'+DRUI.esc(b.name)+'</div>' +
      '<div style="font-size:.625rem;color:var(--t4)">'+DRUI.esc(b.businessType||'')+' · '+s.agents.length+' agents</div></div>' +
      '<div style="text-align:right"><div style="font-size:.875rem;font-weight:800;color:var(--t1)">'+s.leads.length+'</div>' +
      '<div style="font-size:.5625rem;color:var(--t4);font-weight:700">LEADS</div></div>' +
      AG.statusBadge(b.status) + '</div>';
  });
  h += '</div>';

  /* Recent activity across platform */
  var acts = [];
  leads.slice(0,5).forEach(function(l){
    var b = DRS.get('businesses', l.businessId);
    acts.push({t:l.createdAt, ico:'🎯', txt:'<b>'+DRUI.esc(l.name||'Lead')+'</b> captured'+(b?' · '+DRUI.esc(b.name):'')});
  });
  bookings.slice(0,4).forEach(function(bk){
    var b = DRS.get('businesses', bk.businessId);
    acts.push({t:bk.createdAt, ico:'📅', txt:'<b>'+DRUI.esc(bk.service||'Booking')+'</b> '+bk.status+(b?' · '+DRUI.esc(b.name):'')});
  });
  reviews.slice(0,3).forEach(function(r){
    var b = DRS.get('businesses', r.businessId);
    acts.push({t:r.createdAt, ico:'⭐', txt:(r.rating||'?')+'★ from <b>'+DRUI.esc(r.authorName||'customer')+'</b>'+(b?' · '+DRUI.esc(b.name):'')});
  });
  acts.sort(function(a,b){ return new Date(b.t)-new Date(a.t); });

  h += '<div class="ag-card" style="padding:0;overflow:hidden">' +
    '<div style="padding:16px 18px;border-bottom:1px solid var(--border)">' +
    '<span style="font-size:.875rem;font-weight:800;color:var(--t1)">Recent Activity</span></div>';
  if (!acts.length) h += '<div style="padding:30px;text-align:center;font-size:.8125rem;color:var(--t4)">No activity yet.</div>';
  acts.slice(0,9).forEach(function(a){
    h += '<div style="display:flex;gap:10px;align-items:flex-start;padding:11px 18px;border-bottom:1px solid var(--border-s);font-size:.75rem">' +
      '<span>'+a.ico+'</span><span style="flex:1;color:var(--t2)">'+a.txt+'</span>' +
      '<span style="font-size:.625rem;color:var(--t4);white-space:nowrap">'+DRUI.timeAgo(a.t)+'</span></div>';
  });
  h += '</div></div>';

  document.getElementById('content').innerHTML = h;
}
render();
</script>
</body>
</html>
