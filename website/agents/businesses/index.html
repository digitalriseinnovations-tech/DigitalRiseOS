<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Businesses — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .biz-row { cursor:pointer;transition:background .12s; }
    .biz-row:hover { background:var(--bg-alt); }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content" id="content"></main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'businesses' });

function render() {
  var businesses = DRS.list('businesses');
  var h = DRUI.pageHeader('Businesses',
    businesses.length + ' business' + (businesses.length===1?'':'es') + ' on the platform',
    '<a class="btn btn--primary" href="/agents/businesses/new">+ Add Business</a>');

  var totalLeads = DRS.list('leads').length;
  var totalAgents = DRS.list('agents').length;
  var totalConvs = DRS.list('conversations').length;
  h += DRUI.kpiRow([
    { ico:'🏢', val:businesses.length, label:'Businesses Supported', bg:'var(--accent-bg)' },
    { ico:'🤖', val:totalAgents, label:'AI Employees Working', bg:'var(--green-bg)' },
    { ico:'🎯', val:totalLeads, label:'Enquiries Captured', bg:'#FEF3C7' },
    { ico:'💬', val:totalConvs, label:'Conversations Handled', bg:'#FDF2F8' },
  ]);

  if (!businesses.length) {
    h += DRUI.empty('🏢','No businesses yet','Add your first business to deploy AI agents.',
      '<a class="btn btn--primary" href="/agents/businesses/new">+ Add Business</a>');
  } else {
    var rows = businesses.map(function(b){
      var grp = DRD.group(b.industryGroup);
      var s = DRA.bizStats(b.id);
      var ready = s.agents.filter(function(a){return a.trainingStatus==='ready';}).length;
      return '<tr class="biz-row" onclick="window.location.href=\'/agents/businesses/'+b.slug+'\'">' +
        DRUI.td('<div style="display:flex;align-items:center;gap:10px">'+AG.bizAv(b)+
          '<div><div style="font-weight:700;color:var(--t1)">'+DRUI.esc(b.name)+'</div>'+
          '<div style="font-size:.6875rem;color:var(--t4)">'+DRUI.esc(b.location||'')+'</div></div></div>') +
        DRUI.td((grp?grp.icon+' '+grp.label:'—')+'<div style="font-size:.6875rem;color:var(--t4)">'+DRUI.esc(b.businessType||'')+'</div>') +
        DRUI.td('<b>'+s.agents.length+'</b> <span style="color:var(--t4);font-size:.6875rem">('+ready+' trained)</span>') +
        DRUI.td('<b>'+s.leads.length+'</b>') +
        DRUI.td('<b>'+s.bookings.length+'</b>') +
        DRUI.td(AG.statusBadge(b.status)) +
        DRUI.td('<span style="font-size:.6875rem;color:var(--t4)">'+DRUI.timeAgo(b.createdAt)+'</span>') +
      '</tr>';
    }).join('');
    h += DRUI.table(['Business','Industry','AI Team','Enquiries','Bookings','Status','Added'], rows);
  }
  document.getElementById('content').innerHTML = h;
}
render();
</script>
</body>
</html>
