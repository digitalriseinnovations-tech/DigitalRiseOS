<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Business — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .wz-steps { display:flex;gap:4px;margin-bottom:26px;overflow-x:auto;padding-bottom:4px; }
    .wz-step {
      display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:99px;
      font-size:.6875rem;font-weight:700;color:var(--t4);white-space:nowrap;
      background:var(--bg-alt);border:1.5px solid transparent;transition:all .2s;
    }
    .wz-step .n {
      width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--t3);
      display:flex;align-items:center;justify-content:center;font-size:.5625rem;font-weight:800;flex-shrink:0;
    }
    .wz-step.is-active { background:var(--accent-bg);color:var(--accent);border-color:var(--accent); }
    .wz-step.is-active .n { background:var(--accent);color:#fff; }
    .wz-step.is-done { color:var(--green-t);background:var(--green-bg); }
    .wz-step.is-done .n { background:var(--green);color:#fff; }

    .wz-panel { display:none; }
    .wz-panel.is-active { display:block;animation:wzIn .25s ease; }
    @keyframes wzIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .wz-title { font-size:1.25rem;font-weight:800;color:var(--t1);margin-bottom:4px;letter-spacing:-.01em; }
    .wz-sub { font-size:.8438rem;color:var(--t3);margin-bottom:22px; }

    .wz-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px; }
    .wz-card {
      background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);
      padding:18px 16px;cursor:pointer;transition:all .18s;position:relative;
    }
    .wz-card:hover { transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent); }
    .wz-card.is-selected { border-color:var(--accent);background:var(--accent-bg); }
    .wz-card.is-selected::after {
      content:'✓';position:absolute;top:10px;right:12px;width:20px;height:20px;border-radius:50%;
      background:var(--accent);color:#fff;font-size:.6875rem;font-weight:800;
      display:flex;align-items:center;justify-content:center;
    }
    .wz-card .ico { font-size:1.75rem;margin-bottom:10px; }
    .wz-card .lbl { font-size:.8125rem;font-weight:700;color:var(--t1); }
    .wz-card .sb  { font-size:.6875rem;color:var(--t3);margin-top:3px;line-height:1.45; }

    .wz-agent {
      display:flex;align-items:flex-start;gap:13px;background:var(--card);
      border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:15px 16px;
      margin-bottom:10px;transition:all .15s;
    }
    .wz-agent.is-on { border-color:var(--accent);background:var(--accent-bg); }
    .wz-agent .aico { width:38px;height:38px;border-radius:10px;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0; }
    .wz-agent.is-on .aico { background:#fff; }
    .wz-rec { font-size:.5625rem;font-weight:800;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent);border-radius:99px;padding:1px 7px;letter-spacing:.04em; }

    .sw { position:relative;width:36px;height:20px;flex-shrink:0;margin-left:auto;margin-top:2px;cursor:pointer; }
    .sw input { opacity:0;width:0;height:0; }
    .sw .tr { position:absolute;inset:0;background:var(--border);border-radius:99px;transition:.2s; }
    .sw .tr::before { content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sw input:checked + .tr { background:var(--accent); }
    .sw input:checked + .tr::before { transform:translateX(16px); }

    .tr-row { display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:9px; }
    .tr-bar { flex:1;height:5px;border-radius:99px;background:var(--border-s);overflow:hidden;max-width:180px; }
    .tr-bar > div { height:100%;border-radius:99px;background:var(--accent);width:0%;transition:width 1.1s ease; }

    .wz-chat { display:grid;grid-template-columns:1fr 260px;gap:14px; }
    @media(max-width:760px){ .wz-chat{grid-template-columns:1fr} }
    .wz-chat-main { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);display:flex;flex-direction:column;height:400px;overflow:hidden; }
    .wz-chat-body { flex:1;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:9px; }
    .wz-msg { max-width:80%;padding:9px 13px;border-radius:12px;font-size:.8125rem;line-height:1.5;white-space:pre-wrap; }
    .wz-msg.in  { background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px; }
    .wz-msg.out { background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px; }
    .wz-actions { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:16px; }
    .wz-act { display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--green-bg);border:1px solid #A7F3D0;border-radius:8px;font-size:.75rem;font-weight:600;color:var(--green-t);margin-bottom:7px;animation:wzIn .25s ease; }

    .wz-code { background:#1E293B;border-radius:var(--radius);padding:14px 16px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;line-height:1.7;position:relative;overflow-x:auto;white-space:pre; }

    .wz-footer { display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:18px;border-top:1px solid var(--border); }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content">
      <div id="ph"></div>
      <div class="wz-steps" id="wzSteps"></div>
      <div id="wzPanels"></div>
      <div class="wz-footer">
        <button class="btn btn--ghost" id="btnBack" onclick="wzBack()">← Back</button>
        <button class="btn btn--primary" id="btnNext" onclick="wzNext()">Continue →</button>
      </div>
    </main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'businesses' });
document.getElementById('ph').innerHTML = DRUI.pageHeader('Add a Business',
  'Onboard a new business and deploy its AI employees in 8 steps.');

/* ── Wizard state ─────────────────────────────────────────── */
var W = {
  step: 1,
  industryGroup: null, businessType: null,
  name:'', website:'', phone:'', email:'', whatsapp:'', location:'', reviewLink:'', bookingLink:'',
  selectedAgents: [],
  knowledge: {},
  trained: false,
  createdBiz: null,
  testerMsgs: [], testerLead: null,
};
var STEPS = ['Industry','Business Type','Details','AI Agents','Knowledge','Train','Test','Deploy'];

function renderSteps() {
  document.getElementById('wzSteps').innerHTML = STEPS.map(function(s,i){
    var n = i+1;
    var cls = n === W.step ? ' is-active' : n < W.step ? ' is-done' : '';
    return '<div class="wz-step'+cls+'"><span class="n">'+(n < W.step ? '✓' : n)+'</span>'+s+'</div>';
  }).join('');
  document.getElementById('btnBack').style.visibility = (W.step === 1 || W.createdBiz) ? 'hidden' : 'visible';
  var next = document.getElementById('btnNext');
  next.textContent = W.step === 8 ? '✓ Finish — Open Business' : W.step === 5 ? 'Save Knowledge & Continue →' : 'Continue →';
}

function panel(n, html) {
  return '<div class="wz-panel'+(n===W.step?' is-active':'')+'" id="wz'+n+'">'+html+'</div>';
}

function render() {
  renderSteps();
  var P = document.getElementById('wzPanels');
  var h = '';

  /* Step 1 — Industry group */
  h += panel(1,
    '<div class="wz-title">Select Industry Group</div>'+
    '<div class="wz-sub">Which industry does this business belong to? This decides the recommended AI agents and knowledge fields.</div>'+
    '<div class="wz-grid">'+ DRD.industryGroups.map(function(g){
      return '<div class="wz-card'+(W.industryGroup===g.id?' is-selected':'')+'" onclick="pickGroup(\''+g.id+'\')">'+
        '<div class="ico">'+g.icon+'</div><div class="lbl">'+g.label+'</div>'+
        '<div class="sb">'+g.types.slice(0,3).join(', ')+'…</div></div>';
    }).join('')+'</div>');

  /* Step 2 — Business type */
  var grp = DRD.group(W.industryGroup);
  h += panel(2,
    '<div class="wz-title">Select Business Type</div>'+
    '<div class="wz-sub">'+(grp ? 'Business types in <b>'+grp.label+'</b>:' : 'Select an industry group first.')+'</div>'+
    '<div class="wz-grid">'+ (grp ? grp.types.map(function(t){
      return '<div class="wz-card'+(W.businessType===t?' is-selected':'')+'" onclick="pickType(\''+t.replace(/'/g,"\\'")+'\')">'+
        '<div class="ico">'+grp.icon+'</div><div class="lbl">'+t+'</div></div>';
    }).join('') : '')+'</div>');

  /* Step 3 — Details */
  h += panel(3,
    '<div class="wz-title">Business Details</div>'+
    '<div class="wz-sub">Core contact info the AI agents will use when talking to customers.</div>'+
    '<div class="ag-form-row">'+
      fld('name','Business Name *','e.g. Sunshine Nursery')+fld('website','Website','e.g. sunshinenursery.ca')+
    '</div><div class="ag-form-row">'+
      fld('phone','Phone','+1 …')+fld('email','Email','hello@…')+
    '</div><div class="ag-form-row">'+
      fld('whatsapp','WhatsApp','+1 …')+fld('location','Location','City, Province')+
    '</div><div class="ag-form-row">'+
      fld('reviewLink','Google Review Link','https://g.page/r/…')+fld('bookingLink','Booking Link (if any)','https://…')+
    '</div>');

  /* Step 4 — Agents */
  var agents = W.industryGroup ? DRD.agentsFor(W.industryGroup) : [];
  h += panel(4,
    '<div class="wz-title">Choose AI Agents</div>'+
    '<div class="wz-sub">Recommended agents for a <b>'+(W.businessType||'business')+'</b> are pre-selected. Toggle any on or off.</div>'+
    agents.map(function(a){
      var on = W.selectedAgents.indexOf(a.type) !== -1;
      return '<div class="wz-agent'+(on?' is-on':'')+'" id="wzag_'+a.type+'">'+
        '<div class="aico">'+a.icon+'</div>'+
        '<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
          '<span style="font-size:.8438rem;font-weight:700;color:var(--t1)">'+a.name+'</span>'+
          (a.recommended?'<span class="wz-rec">RECOMMENDED</span>':'')+
          (a.industrySpecific?'<span class="wz-rec" style="color:var(--green-t);border-color:var(--green);background:var(--green-bg)">INDUSTRY</span>':'')+
        '</div>'+
        '<div style="font-size:.75rem;color:var(--t3);margin-top:3px;line-height:1.5">'+a.desc+'</div>'+
        '<div style="font-size:.625rem;color:var(--t4);margin-top:5px;font-weight:600">Channels: '+a.channels.join(', ')+'</div></div>'+
        '<label class="sw"><input type="checkbox" '+(on?'checked':'')+' onchange="toggleAgent(\''+a.type+'\',this.checked)"><span class="tr"></span></label>'+
      '</div>';
    }).join(''));

  /* Step 5 — Knowledge */
  var fields = W.industryGroup ? DRD.fieldsFor(W.industryGroup) : [];
  h += panel(5,
    '<div class="wz-title">Business Knowledge</div>'+
    '<div class="wz-sub">This is what the AI agents learn. Universal fields plus <b>'+(grp?grp.label:'')+'</b>-specific fields. Fill in what you know — you can edit later.</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">'+
    fields.map(function(f){
      var v = DRUI.esc(W.knowledge[f.id]||'');
      return '<div class="ag-form-group"><label class="ag-label">'+f.label+'</label>'+
        (f.ta ? '<textarea class="ag-textarea" style="min-height:64px" id="kb_'+f.id+'" placeholder="'+f.ph+'">'+v+'</textarea>'
              : '<input class="ag-input" id="kb_'+f.id+'" placeholder="'+f.ph+'" value="'+v+'">')+
      '</div>';
    }).join('')+'</div>');

  /* Step 6 — Train */
  h += panel(6,
    '<div class="wz-title">Train Agents</div>'+
    '<div class="wz-sub">Each selected agent is trained on the business knowledge you provided.</div>'+
    '<div id="trainRows">'+ W.selectedAgents.map(function(t){
      var def = DRD.agentDef(W.industryGroup, t) || {name:t, icon:'🤖'};
      return '<div class="tr-row" id="tr_'+t+'">'+
        '<span style="font-size:1.125rem">'+def.icon+'</span>'+
        '<span style="flex:1;font-size:.8125rem;font-weight:700;color:var(--t1)">'+def.name+'</span>'+
        '<div class="tr-bar"><div id="trb_'+t+'"></div></div>'+
        '<span id="trs_'+t+'">'+DRUI.trainBadge(W.trained?'ready':'not-trained')+'</span>'+
      '</div>';
    }).join('')+'</div>'+
    '<button class="btn btn--primary" id="btnTrain" onclick="trainNow()" '+(W.trained?'disabled':'')+' style="margin-top:14px">'+(W.trained?'✓ All Agents Trained':'⚡ Train All Agents')+'</button>');

  /* Step 7 — Test */
  var agentOpts = W.selectedAgents.map(function(t){
    var def = DRD.agentDef(W.industryGroup, t)||{name:t};
    return '<option value="'+t+'">'+def.name+'</option>';
  }).join('');
  h += panel(7,
    '<div class="wz-title">Test Agents</div>'+
    '<div class="wz-sub">Ask sample questions — the agent answers from the knowledge you saved. Give it a name + phone number to see lead capture.</div>'+
    '<div style="margin-bottom:12px"><select class="ag-select" id="testAgent" style="width:280px">'+agentOpts+'</select></div>'+
    '<div class="wz-chat"><div class="wz-chat-main">'+
      '<div class="wz-chat-body" id="testBody"></div>'+
      '<div style="display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)">'+
        '<input class="ag-input" id="testInput" placeholder="e.g. What are your fees?" style="flex:1" onkeydown="if(event.key===\'Enter\')testSend()">'+
        '<button class="btn btn--primary" onclick="testSend()">Send</button>'+
      '</div></div>'+
      '<div class="wz-actions"><div style="font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:10px">Agent Actions</div>'+
      '<div id="testActions"><div style="font-size:.75rem;color:var(--t4)">Actions appear here as the agent works…</div></div></div>'+
    '</div>');

  /* Step 8 — Deploy */
  h += panel(8, renderDeploy());

  P.innerHTML = h;
  if (W.step === 7 && !W.testerMsgs.length) testGreet();
}

function fld(id,label,ph) {
  return '<div class="ag-form-group"><label class="ag-label">'+label+'</label>'+
    '<input class="ag-input" id="f_'+id+'" placeholder="'+ph+'" value="'+DRUI.esc(W[id]||'')+'"></div>';
}

/* ── Step interactions ────────────────────────────────────── */
window.pickGroup = function(id){
  if (W.industryGroup !== id) { W.businessType = null; W.selectedAgents = []; }
  W.industryGroup = id; render();
};
window.pickType = function(t){
  W.businessType = t;
  if (!W.selectedAgents.length) {
    W.selectedAgents = DRD.agentsFor(W.industryGroup).filter(function(a){return a.recommended;}).map(function(a){return a.type;});
  }
  render();
};
window.toggleAgent = function(type, on){
  var i = W.selectedAgents.indexOf(type);
  if (on && i===-1) W.selectedAgents.push(type);
  if (!on && i!==-1) W.selectedAgents.splice(i,1);
  var row = document.getElementById('wzag_'+type);
  if (row) row.classList.toggle('is-on', on);
};

function saveDetails() {
  ['name','website','phone','email','whatsapp','location','reviewLink','bookingLink'].forEach(function(k){
    var el = document.getElementById('f_'+k); if (el) W[k] = el.value.trim();
  });
}
function saveKnowledge() {
  DRD.fieldsFor(W.industryGroup).forEach(function(f){
    var el = document.getElementById('kb_'+f.id);
    if (el && el.value.trim()) W.knowledge[f.id] = el.value.trim();
    else if (el) delete W.knowledge[f.id];
  });
  if (W.reviewLink && !W.knowledge.reviewLink) W.knowledge.reviewLink = W.reviewLink;
  if (W.whatsapp && !W.knowledge.whatsapp)   W.knowledge.whatsapp   = W.whatsapp;
}

/* ── Training ─────────────────────────────────────────────── */
window.trainNow = function(){
  var btn = document.getElementById('btnTrain');
  btn.disabled = true; btn.textContent = 'Training…';
  W.selectedAgents.forEach(function(t,i){
    setTimeout(function(){
      document.getElementById('trs_'+t).innerHTML = DRUI.trainBadge('training');
      document.getElementById('trb_'+t).style.width = '100%';
      setTimeout(function(){
        document.getElementById('trs_'+t).innerHTML = DRUI.trainBadge('ready');
        if (i === W.selectedAgents.length-1) {
          W.trained = true;
          btn.textContent = '✓ All Agents Trained';
          AG.toast('All agents trained successfully!','success');
        }
      }, 1200);
    }, i*400);
  });
};

/* ── Tester ───────────────────────────────────────────────── */
function fakeBiz(){ return { id:'preview', name:W.name||'Your Business', knowledge:W.knowledge, whatsapp:W.whatsapp, reviewLink:W.reviewLink }; }
function addTestMsg(role, text){
  W.testerMsgs.push({role:role,text:text});
  var b = document.getElementById('testBody');
  var d = document.createElement('div'); d.className = 'wz-msg '+role; d.textContent = text;
  b.appendChild(d); b.scrollTop = b.scrollHeight;
}
function testGreet(){
  addTestMsg('in', "Hi there! 👋 I'm the AI assistant for "+(W.name||'your business')+". Ask me anything a customer would ask!");
}
window.testSend = function(){
  var inp = document.getElementById('testInput');
  var v = inp.value.trim(); if(!v) return;
  inp.value='';
  addTestMsg('out', v);
  var type = document.getElementById('testAgent').value;
  var def = DRD.agentDef(W.industryGroup, type);
  var res = DRA.respond(fakeBiz(), {agentName: def?def.name:'Agent'}, v);
  setTimeout(function(){
    addTestMsg('in', res.reply);
    if (res.actions.length) {
      var box = document.getElementById('testActions');
      if (box.querySelector('div[style]')) box.innerHTML='';
      res.actions.forEach(function(a){
        box.innerHTML += '<div class="wz-act"><span>'+a.icon+'</span>'+a.label+'</div>';
        if (a.type==='lead' && !W.testerLead) {
          var phone = (v.match(/\+?[\d][\d\s\-().]{6,}/)||[null])[0];
          W.testerLead = { name: phone ? v.replace(phone,'').replace(/[,.]/g,'').trim() || 'Tester Lead' : 'Tester Lead',
                           phone: phone || '', enquiryType: 'Wizard Test', notes: 'Captured during onboarding test' };
        }
      });
    }
  }, 600);
};

/* ── Deploy panel ─────────────────────────────────────────── */
function renderDeploy() {
  var slug = W.createdBiz ? W.createdBiz.slug : DRA.slugify(W.name||'your-business');
  var primary = W.selectedAgents[0] || 'website-enquiry';
  var snippet = '&lt;script src="https://digital-rise-os.vercel.app/agents/widget/widget.js"\n        data-business="'+slug+'"\n        data-agent="'+primary+'"&gt;&lt;/script&gt;';
  var opts = [
    { ico:'💻', t:'Website Widget',        s:'One script tag on the client website — chat bubble appears instantly.', on:W.selectedAgents.indexOf('website-enquiry')!==-1 },
    { ico:'📲', t:'WhatsApp Follow-up',    s:'Connect the business WhatsApp number for automated follow-ups.', on:W.selectedAgents.indexOf('whatsapp-followup')!==-1 },
    { ico:'📧', t:'Email Reply Assistant', s:'Forward the enquiry inbox — the agent drafts replies.', on:W.selectedAgents.indexOf('email-inbox')!==-1 },
    { ico:'⭐', t:'Review Request Link',   s:'Share after each job/visit to collect Google reviews.', on:W.selectedAgents.indexOf('review')!==-1 },
    { ico:'📅', t:'Booking Flow',          s:'Agent offers tours/appointments and logs them to the dashboard.', on:W.selectedAgents.indexOf('booking')!==-1 },
  ];
  return '<div class="wz-title">Deploy</div>'+
    '<div class="wz-sub">Deployment options for <b>'+DRUI.esc(W.name||'this business')+'</b>. The website widget is live the moment the snippet is installed.</div>'+
    '<div class="wz-grid" style="margin-bottom:20px">'+opts.map(function(o){
      return '<div class="wz-card" style="cursor:default;'+(o.on?'':'opacity:.45')+'"><div class="ico">'+o.ico+'</div>'+
        '<div class="lbl">'+o.t+' '+(o.on?'<span class="badge badge--green" style="margin-left:4px">Enabled</span>':'<span class="badge badge--gray" style="margin-left:4px">Not selected</span>')+'</div>'+
        '<div class="sb">'+o.s+'</div></div>';
    }).join('')+'</div>'+
    '<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:8px">Website widget snippet</div>'+
    '<div class="wz-code" id="deployCode">'+snippet+'</div>'+
    '<button class="btn btn--ghost btn--sm" style="margin-top:10px" onclick="copyDeploy()">📋 Copy Snippet</button>';
}
window.copyDeploy = function(){
  var el = document.getElementById('deployCode');
  navigator.clipboard.writeText(el.textContent).then(function(){ AG.toast('Snippet copied!','success'); });
};

/* ── Navigation ───────────────────────────────────────────── */
window.wzBack = function(){ if (W.step>1){ if(W.step===3)saveDetails(); if(W.step===5)saveKnowledge(); W.step--; render(); } };
window.wzNext = function(){
  if (W.step===1 && !W.industryGroup) return AG.toast('Select an industry group','error');
  if (W.step===2 && !W.businessType)  return AG.toast('Select a business type','error');
  if (W.step===3) {
    saveDetails();
    if (!W.name) return AG.toast('Business name is required','error');
  }
  if (W.step===4 && !W.selectedAgents.length) return AG.toast('Select at least one AI agent','error');
  if (W.step===5) { saveKnowledge(); AG.toast('Knowledge saved','success'); }
  if (W.step===6 && !W.trained) return AG.toast('Click "Train All Agents" first','error');

  if (W.step===8) { finish(); return; }
  W.step++; render();
};

function finish() {
  if (!W.createdBiz) {
    W.createdBiz = DRA.createBusiness(W);
    if (W.testerMsgs.length > 1) {
      var agents = DRS.list('agents', { businessId: W.createdBiz.id });
      var firstAgent = agents[agents.length-1] || null;
      var leadRec = null;
      if (W.testerLead) leadRec = DRA.captureLead(W.createdBiz, firstAgent, W.testerLead);
      DRA.logConversation(W.createdBiz, firstAgent, W.testerMsgs, leadRec ? leadRec.id : null);
    }
  }
  AG.toast('Business created! Opening dashboard…','success');
  setTimeout(function(){ window.location.href = '/agents/businesses/' + W.createdBiz.slug; }, 700);
}

render();
</script>
</body>
</html>
