<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Business — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .wz-steps { display:flex;gap:4px;margin-bottom:26px;overflow-x:auto;padding-bottom:4px; }
    .wz-step { display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:99px;font-size:.6875rem;font-weight:700;color:var(--t4);white-space:nowrap;background:var(--bg-alt);border:1.5px solid transparent;transition:all .2s; }
    .wz-step .n { width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:.5625rem;font-weight:800;flex-shrink:0; }
    .wz-step.is-active { background:var(--accent-bg);color:var(--accent);border-color:var(--accent); }
    .wz-step.is-active .n { background:var(--accent);color:#fff; }
    .wz-step.is-done { color:var(--green-t);background:var(--green-bg); }
    .wz-step.is-done .n { background:var(--green);color:#fff; }
    .wz-panel { display:none; } .wz-panel.is-active { display:block;animation:wzIn .25s ease; }
    @keyframes wzIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wz-title { font-size:1.25rem;font-weight:800;color:var(--t1);margin-bottom:4px;letter-spacing:-.01em; }
    .wz-sub { font-size:.8438rem;color:var(--t3);margin-bottom:22px; }
    .wz-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px; }
    .wz-card { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;cursor:pointer;transition:all .18s;position:relative; }
    .wz-card:hover { transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent); }
    .wz-card.is-selected { border-color:var(--accent);background:var(--accent-bg); }
    .wz-card .ico { font-size:1.75rem;margin-bottom:10px; }
    .wz-card .lbl { font-size:.8125rem;font-weight:700;color:var(--t1); }
    .wz-card .sb  { font-size:.6875rem;color:var(--t3);margin-top:3px;line-height:1.45; }

    .imp-console { background:#0F172A;border-radius:var(--radius-xl);padding:20px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;min-height:260px;max-height:340px;overflow-y:auto;line-height:1.9; }
    .imp-line { display:flex;gap:8px;align-items:center;animation:wzIn .2s ease; }
    .imp-ok { color:#4ADE80; } .imp-warn { color:#FBBF24; } .imp-head { color:#818CF8;font-weight:700;margin-top:6px; }
    .imp-summary { display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:16px; }
    .imp-stat { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;text-align:center; }
    .imp-stat b { display:block;font-size:1.25rem;color:var(--t1); }
    .imp-stat span { font-size:.625rem;color:var(--t4);font-weight:700; }

    .rv-sec { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px; }
    .rv-sec .rv-h { display:flex;align-items:center;gap:8px;font-size:.8125rem;font-weight:800;color:var(--t1);margin-bottom:8px; }
    .rv-src { font-size:.5625rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--accent-bg);color:var(--accent);letter-spacing:.04em; }

    .wz-agent { display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:15px 16px;margin-bottom:10px;transition:all .15s; }
    .wz-agent.is-on { border-color:var(--accent);background:var(--accent-bg); }
    .wz-agent .aico { width:38px;height:38px;border-radius:10px;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0; }
    .wz-agent.is-on .aico { background:#fff; }
    .wz-rec { font-size:.5625rem;font-weight:800;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent);border-radius:99px;padding:1px 7px;letter-spacing:.04em; }
    .sw { position:relative;width:36px;height:20px;flex-shrink:0;margin-left:auto;margin-top:2px;cursor:pointer; }
    .sw input { opacity:0;width:0;height:0; }
    .sw .tr { position:absolute;inset:0;background:var(--border);border-radius:99px;transition:.2s; }
    .sw .tr::before { content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sw input:checked + .tr { background:var(--accent); }
    .sw input:checked + .tr::before { transform:translateX(16px); }

    .src-row { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-s);font-size:.8125rem; }
    .src-row:last-child { border:none; }
    .tr-row { display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:9px; }
    .tr-bar { flex:1;height:5px;border-radius:99px;background:var(--border-s);overflow:hidden;max-width:180px; }
    .tr-bar > div { height:100%;border-radius:99px;background:var(--accent);width:0%;transition:width 1.1s ease; }

    .sc-chips { display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px; }
    .sc-chip { padding:6px 12px;border:1.5px solid var(--accent);border-radius:99px;font-size:.71875rem;font-weight:600;color:var(--accent);background:var(--card);cursor:pointer;transition:all .15s; }
    .sc-chip:hover { background:var(--accent);color:#fff; }
    .sc-chip b { font-weight:800;opacity:.65;margin-right:4px;font-size:.625rem;text-transform:uppercase; }
    .wz-chat { display:grid;grid-template-columns:1fr 300px;gap:14px; }
    @media(max-width:800px){ .wz-chat{grid-template-columns:1fr} }
    .wz-chat-main { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);display:flex;flex-direction:column;height:430px;overflow:hidden; }
    .wz-chat-body { flex:1;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:9px; }
    .wz-msg { max-width:80%;padding:9px 13px;border-radius:12px;font-size:.8125rem;line-height:1.5;white-space:pre-wrap; }
    .wz-msg.in  { background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px; }
    .wz-msg.out { background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px; }
    .chk-row { display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-s);font-size:.71875rem;gap:8px; }
    .chk-row:last-child { border:none; }
    .chk-yes { color:var(--green-t);font-weight:800; } .chk-no { color:var(--t4);font-weight:700; }

    .gate { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-s);font-size:.8125rem; }
    .gate:last-child { border:none; }
    .gate .g-ok { color:var(--green-t);font-weight:800; } .gate .g-no { color:#DC2626;font-weight:800; }
    .ch-opt { display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:all .15s; }
    .ch-opt.is-on { border-color:var(--accent);background:var(--accent-bg); }
    .wz-code { background:#1E293B;border-radius:var(--radius);padding:14px 16px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;line-height:1.7;overflow-x:auto;white-space:pre; }
    .wz-footer { display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap; }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content">
      <div id="ph"></div>
      <div class="wz-steps" id="wzSteps"></div>
      <div id="wzPanels"></div>
      <div class="wz-footer">
        <div style="display:flex;gap:10px">
          <button class="btn btn--ghost" id="btnBack" onclick="wzBack()">← Back</button>
          <button class="btn btn--ghost" id="btnDraft" onclick="saveDraft()">💾 Save Draft</button>
        </div>
        <button class="btn btn--primary" id="btnNext" onclick="wzNext()">Continue →</button>
      </div>
    </main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-import.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'businesses' });

var W = {
  step: 1, bizId: null,
  name:'', website:'', industryGroup:null, businessType:null,
  location:'', phone:'', email:'', whatsapp:'', reviewLink:'', bookingLink:'', notes:'',
  social: { instagram:'', facebook:'', linkedin:'', tiktok:'', youtube:'' },
  intel: null, importDone:false, importing:false, escalation:'',
  selectedAgents: [],
  trained: false, tested: false,
  channels: { widget:false, whatsapp:false, email:false, webhook:false, demo:true },
  testerCtx: {}, testerMsgs: [], testerConvSaved:false,
};
var STEPS = ['Basics','Import','Review','AI Employees','Train','Test','Deploy'];

function biz() { return W.bizId ? DRS.get('businesses', W.bizId) : null; }

function renderHeader() {
  var b = biz();
  var badge = b ? DRA.setupBadge(DRA.bizSetupStatus(b)) : '<span class="badge badge--gray">Not saved yet</span>';
  document.getElementById('ph').innerHTML = DRUI.pageHeader('Add a Business',
    'Set up the business, import its knowledge, train and test its AI employees, then deploy.',
    badge);
}

function renderSteps() {
  renderHeader();
  document.getElementById('wzSteps').innerHTML = STEPS.map(function(s,i){
    var n = i+1;
    var cls = n === W.step ? ' is-active' : n < W.step ? ' is-done' : '';
    return '<div class="wz-step'+cls+'"><span class="n">'+(n < W.step ? '✓' : n)+'</span>'+s+'</div>';
  }).join('');
  document.getElementById('btnBack').style.visibility = W.step === 1 ? 'hidden' : 'visible';
  document.getElementById('btnDraft').style.display = W.bizId || W.step === 1 ? '' : 'none';
  var next = document.getElementById('btnNext');
  next.textContent = W.step === 7 ? '🚀 Deploy AI Employee'
    : W.step === 2 ? (W.importDone ? 'Review Import →' : '⚡ Run Import') : 'Continue →';
}
function panel(n, html) { return '<div class="wz-panel'+(n===W.step?' is-active':'')+'" id="wz'+n+'">'+html+'</div>'; }
function fld(id,label,ph) {
  return '<div class="ag-form-group"><label class="ag-label">'+label+'</label>'+
    '<input class="ag-input" id="f_'+id+'" placeholder="'+ph+'" value="'+DRUI.esc(id.indexOf('soc_')===0 ? W.social[id.slice(4)] : (W[id]||''))+'"></div>';
}

function render() {
  renderSteps();
  var h = '';
  var grp = DRD.group(W.industryGroup);

  /* 1 — Basics */
  h += panel(1,
    '<div class="wz-title">Business Basics</div>'+
    '<div class="wz-sub">Everything the import engine and AI employees need. Saved as a draft the moment you continue.</div>'+
    '<div class="ag-form-row">'+fld('name','Business Name *','e.g. Sunshine Nursery')+fld('website','Website URL *','e.g. sunshinenursery.ca')+'</div>'+
    '<div class="ag-form-row"><div class="ag-form-group"><label class="ag-label">Industry Group *</label>'+
      '<select class="ag-select" id="f_industry" onchange="pickGroup(this.value)"><option value="">Select industry…</option>'+
      DRD.industryGroups.map(function(g){ return '<option value="'+g.id+'"'+(W.industryGroup===g.id?' selected':'')+'>'+g.icon+' '+g.label+'</option>'; }).join('')+'</select></div>'+
      '<div class="ag-form-group"><label class="ag-label">Business Type *</label>'+
      '<select class="ag-select" id="f_type"><option value="">Select type…</option>'+
      (grp ? grp.types.map(function(t){ return '<option'+(W.businessType===t?' selected':'')+'>'+t+'</option>'; }).join('') : '')+'</select></div></div>'+
    '<div class="ag-form-row">'+fld('location','City / Location','City, Province')+fld('phone','Phone','+1 …')+'</div>'+
    '<div class="ag-form-row">'+fld('email','Email','hello@…')+fld('whatsapp','WhatsApp Number','+1 …')+'</div>'+
    '<div class="ag-form-row">'+fld('reviewLink','Google Review Link','https://g.page/r/…')+fld('bookingLink','Booking Link (if any)','https://…')+'</div>'+
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:16px 0 10px">Social profiles (optional — improves tone training)</div>'+
    '<div class="ag-form-row">'+fld('soc_instagram','Instagram','https://instagram.com/…')+fld('soc_facebook','Facebook','https://facebook.com/…')+'</div>'+
    '<div class="ag-form-row">'+fld('soc_linkedin','LinkedIn','https://linkedin.com/company/…')+fld('soc_tiktok','TikTok','https://tiktok.com/@…')+'</div>'+
    '<div class="ag-form-group"><label class="ag-label">Notes for the AI employee</label><textarea class="ag-textarea" id="f_notes" style="min-height:52px" placeholder="Special rules, closures, tone notes…">'+DRUI.esc(W.notes)+'</textarea></div>');

  /* 2 — Import */
  h += panel(2,
    '<div class="wz-title">Business Intelligence Import</div>'+
    '<div class="wz-sub">Importing knowledge from <b>'+DRUI.esc(W.website||'the website')+'</b>, public business profile, and socials — so the AI employee starts smart, not blank.</div>'+
    '<div class="imp-console" id="impConsole"><div style="color:#64748B">▸ Ready. Click "⚡ Run Import" below.</div></div>'+
    '<div class="imp-summary" id="impSummary"></div>');

  /* 3 — Review */
  h += panel(3, renderReview());

  /* 4 — AI Employees */
  var agents = W.industryGroup ? DRD.agentsFor(W.industryGroup) : [];
  h += panel(4,
    '<div class="wz-title">Choose AI Employees</div>'+
    '<div class="wz-sub">Recommended employees for a <b>'+(W.businessType||'business')+'</b> are pre-selected.</div>'+
    agents.map(function(a){
      var on = W.selectedAgents.indexOf(a.type) !== -1;
      var job = DRD.jobFor(a.type);
      return '<div class="wz-agent'+(on?' is-on':'')+'" id="wzag_'+a.type+'">'+
        '<div class="aico">'+a.icon+'</div>'+
        '<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
          '<span style="font-size:.8438rem;font-weight:700;color:var(--t1)">'+a.name+'</span>'+
          (a.recommended?'<span class="wz-rec">RECOMMENDED</span>':'')+
          (a.industrySpecific?'<span class="wz-rec" style="color:var(--green-t);border-color:var(--green);background:var(--green-bg)">INDUSTRY</span>':'')+'</div>'+
        '<div style="font-size:.75rem;color:var(--t3);margin-top:3px;line-height:1.5"><b>'+job.role+'</b> — '+job.purpose+'</div></div>'+
        '<label class="sw"><input type="checkbox" '+(on?'checked':'')+' onchange="toggleAgent(\''+a.type+'\',this.checked)"><span class="tr"></span></label>'+
      '</div>';
    }).join(''));

  /* 5 — Train */
  h += panel(5, renderTrain());

  /* 6 — Test */
  h += panel(6, renderTest());

  /* 7 — Deploy */
  h += panel(7, renderDeploy());

  document.getElementById('wzPanels').innerHTML = h;
  if (W.step === 6 && !W.testerMsgs.length) testGreet();
}

/* ── Step 3: Review ──────────────────────────────────────── */
function renderReview() {
  if (!W.intel) return '<div class="wz-title">Review Imported Knowledge</div><div class="wz-sub">Run the import first.</div>';
  var i = W.intel;
  function sec(icon, title, src, inner) {
    return '<div class="rv-sec"><div class="rv-h">'+icon+' '+title+' <span class="rv-src">'+src+'</span></div>'+inner+'</div>';
  }
  function ta(id, val, rows) {
    return '<textarea class="ag-textarea" id="rv_'+id+'" style="min-height:'+(rows||52)+'px">'+DRUI.esc(val||'')+'</textarea>';
  }
  return '<div class="wz-title">Review Imported Knowledge</div>'+
    '<div class="wz-sub">Edit anything before it becomes the AI employee\'s approved knowledge. It will never answer outside this.</div>'+
    (i.missing && i.missing.length ? '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:14px;font-size:.78125rem;color:#92400E"><b>⚠️ Missing:</b> '+i.missing.join(' · ')+'</div>' : '')+
    sec('🏢','Business Summary','WEBSITE', ta('summary', i.summary, 64))+
    sec('🛠️','Services','WEBSITE', ta('services', (i.services||[]).join('\n'), 84))+
    sec('❓','FAQs ('+(i.faqs||[]).length+')','WEBSITE', ta('faqs', (i.faqs||[]).map(function(f){return 'Q: '+f.q+'\nA: '+f.a;}).join('\n\n'), 130))+
    sec('🕐','Hours','WEBSITE + GOOGLE', ta('hours', i.hours))+
    sec('💰','Pricing Notes','WEBSITE', ta('pricingNotes', i.pricingNotes))+
    sec('📋','Policies','WEBSITE', ta('policies', i.policies))+
    sec('⭐','Google Profile','PUBLIC',
      '<div style="font-size:.78125rem;color:var(--t2)">Rating: <b>'+(i.google||{}).rating+'★</b> ('+(i.google||{}).reviewCount+' reviews)</div>')+
    sec('📣','Tone & Social Notes','SOCIAL',
      '<div style="font-size:.78125rem;color:var(--t2)">Tone: <b>'+((i.social||{}).tone||'—')+'</b> · '+((i.social||{}).serviceMentions||[]).join(' · ')+'</div>')+
    sec('🚨','Escalation Contact','MANUAL', '<input class="ag-input" id="rv_escalation" placeholder="Who handles complex issues? Name + phone" value="'+DRUI.esc(W.escalation)+'">');
}
function saveReview() {
  if (!W.intel) return;
  var g = function(id){ var el = document.getElementById('rv_'+id); return el ? el.value.trim() : null; };
  var s = g('summary'); if (s) W.intel.summary = s;
  var sv = g('services'); if (sv !== null) W.intel.services = sv.split('\n').map(function(x){return x.trim();}).filter(Boolean);
  var fq = g('faqs');
  if (fq !== null) {
    W.intel.faqs = fq.split(/\n\s*\n/).map(function(block){
      var m = block.match(/Q:\s*([\s\S]*?)\nA:\s*([\s\S]*)/);
      return m ? { q:m[1].trim(), a:m[2].trim() } : null;
    }).filter(Boolean);
  }
  ['hours','pricingNotes','policies'].forEach(function(k){ var v = g(k); if (v !== null) W.intel[k] = v; });
  var e2 = g('escalation'); if (e2 !== null) W.escalation = e2;
  persistDraft();
}

/* ── Step 5: Train ───────────────────────────────────────── */
function renderTrain() {
  var b = biz();
  var i = W.intel || {};
  var srcs = [
    ['🌐','Website: '+(W.website||'—'), !!W.intel, W.intel ? (i.pagesFound||[]).length+' pages imported' : 'run import first'],
    ['📝','Manual business notes', !!W.notes, W.notes ? '1 note' : 'none added'],
    ['❓','FAQ items', !!(i.faqs&&i.faqs.length), (i.faqs||[]).length+' FAQs'],
    ['📣','Social profiles', Object.keys(W.social).some(function(k){return W.social[k];}), Object.keys(W.social).filter(function(k){return W.social[k];}).join(', ')||'none'],
    ['⭐','Google review link', !!W.reviewLink, W.reviewLink?'connected':'not set'],
    ['📎','Uploaded documents', false, 'coming soon'],
    ['🧭','Escalation & prompt notes', !!W.escalation, W.escalation||'not set'],
  ];
  var agentsHtml = W.selectedAgents.map(function(t){
    var def = DRD.agentDef(W.industryGroup, t) || {name:t, icon:'🤖'};
    var real = b ? DRS.list('agents',{businessId:b.id}).find(function(a){return a.agentType===t;}) : null;
    var st = real ? real.trainingStatus : 'not-trained';
    return '<div class="tr-row"><span style="font-size:1.125rem">'+def.icon+'</span>'+
      '<span style="flex:1;font-size:.8125rem;font-weight:700;color:var(--t1)">'+def.name+'</span>'+
      '<div class="tr-bar"><div id="trb_'+t+'" style="width:'+(st==='ready'?'100%':'0')+'"></div></div>'+
      '<span id="trs_'+t+'">'+DRUI.trainBadge(st)+'</span></div>';
  }).join('');
  return '<div class="wz-title">Train Your AI Employees</div>'+
    '<div class="wz-sub">Training combines every knowledge source below into the employee\'s approved knowledge. Retrain any time the knowledge changes.</div>'+
    '<div class="ag-card" style="padding:16px 20px;margin-bottom:16px">'+
      '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px">Training sources</div>'+
      srcs.map(function(s){
        return '<div class="src-row"><span>'+s[0]+'</span><span style="flex:1;font-weight:600;color:var(--t1)">'+s[1]+'</span>'+
          '<span style="font-size:.6875rem;color:var(--t4)">'+s[3]+'</span>'+
          (s[2]?'<span class="chk-yes">✓</span>':'<span class="chk-no">—</span>')+'</div>';
      }).join('')+'</div>'+
    agentsHtml +
    '<button class="btn btn--primary" id="btnTrain" onclick="trainNow()" '+(W.trained?'disabled':'')+' style="margin-top:10px">'+(W.trained?'✓ All Employees Trained':'⚡ Train All Employees')+'</button>'+
    '<div id="trainSummary" style="margin-top:14px">'+(W.trained?trainSummaryHtml():'')+'</div>';
}
function trainSummaryHtml() {
  var i = W.intel || {};
  var missing = (i.missing||[]).slice();
  if (!i.pricingNotes && !(W.intel&&W.intel.faqs&&W.intel.faqs.length)) missing.push('Pricing information');
  if (!i.hours) missing.push('Opening hours');
  if (!W.escalation) missing.push('Escalation contact');
  var kCount = ['summary','services','faqs','hours','pricingNotes','policies'].filter(function(k){ var v=i[k]; return v && (!Array.isArray(v)||v.length); }).length;
  return '<div class="ag-card" style="padding:16px 20px;background:var(--green-bg);border-color:#A7F3D0">'+
    '<div style="font-size:.8125rem;font-weight:800;color:var(--green-t);margin-bottom:6px">✓ Training complete</div>'+
    '<div style="font-size:.75rem;color:var(--green-t);line-height:1.8">'+
    '• Knowledge areas imported: <b>'+kCount+'</b><br>'+
    '• FAQs created: <b>'+((i.faqs||[]).length)+'</b><br>'+
    '• AI employees ready: <b>'+W.selectedAgents.length+' / '+W.selectedAgents.length+'</b><br>'+
    (missing.length?'<span style="color:#92400E">• ⚠ Missing (add later in Knowledge & Training): '+missing.join(', ')+'</span>':'• No critical gaps found')+
    '</div></div>';
}

/* ── Step 6: Test ────────────────────────────────────────── */
function renderTest() {
  var cats = DRD.scenarioCats[W.industryGroup];
  var chips = cats
    ? cats.map(function(s){ return '<div class="sc-chip" onclick="runScenario(this.getAttribute(\'data-q\'))" data-q="'+DRUI.esc(s.q)+'"><b>'+s.cat+'</b>'+s.q+'</div>'; }).join('')
    : (DRD.scenarios[W.industryGroup]||[]).map(function(s){ return '<div class="sc-chip" onclick="runScenario(this.textContent)">'+s+'</div>'; }).join('');
  return '<div class="wz-title">Test Before You Deploy</div>'+
    '<div class="wz-sub">Run the category tests — each result shows the detected intent, knowledge used, next action and confidence. These create real records for this business.</div>'+
    '<div class="sc-chips">'+chips+'</div>'+
    '<div class="wz-chat"><div class="wz-chat-main">'+
      '<div class="wz-chat-body" id="testBody"></div>'+
      '<div style="display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)">'+
        '<input class="ag-input" id="testInput" placeholder="Type as a parent/customer…" style="flex:1" onkeydown="if(event.key===\'Enter\')testSend()">'+
        '<button class="btn btn--primary" onclick="testSend()">Send</button></div></div>'+
      '<div class="ag-card" style="padding:16px;height:430px;overflow-y:auto">'+
        '<div style="font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:8px">Outcome Analysis</div>'+
        '<div id="testChecks"><div style="font-size:.75rem;color:var(--t4)">Run a test to see the analysis…</div></div></div>'+
    '</div>';
}

/* ── Step 7: Deploy ──────────────────────────────────────── */
function renderDeploy() {
  var b = biz();
  var slug = b ? b.slug : DRA.slugify(W.name||'your-business');
  var primary = W.selectedAgents.indexOf('website-enquiry')!==-1 ? 'website-enquiry' : (W.selectedAgents[0]||'website-enquiry');
  var snippet = '&lt;script src="https://digital-rise-os.vercel.app/agents/widget/widget.js"\n        data-business="'+slug+'"\n        data-agent="'+primary+'"&gt;&lt;/script&gt;';
  var kbOk = !!(W.intel || Object.keys((b&&b.knowledge)||{}).length);
  var gates = [
    ['Business saved', !!b],
    ['Knowledge trained', kbOk && W.trained],
    ['At least one AI employee selected', W.selectedAgents.length > 0],
    ['Test completed', W.tested],
    ['Deployment channel selected', Object.keys(W.channels).some(function(k){ return k!=='demo' && W.channels[k]; })],
  ];
  var gatesOk = gates.every(function(g){ return g[1]; });
  var CH = [
    ['widget','💻','Website chat widget','Copy the snippet below onto the website'],
    ['whatsapp','📲','WhatsApp ready','Follow-up sequences prepared for the business number'],
    ['email','📧','Email ready','Inbox replies drafted for '+(W.email||'the enquiry inbox')],
    ['webhook','🔗','Zapier / Make webhook ready','Send captured enquiries to any existing tool'],
    ['demo','🎭','Manual demo mode','Test conversations only — no real messages sent'],
  ];
  return '<div class="wz-title">Deploy</div>'+
    '<div class="wz-sub"><b>Demo Mode</b> = simulated conversations only. <b>Live</b> = the AI employee is answering on a real channel. It only goes live when every check passes.</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="dep-cols">'+
    '<div class="ag-card" style="padding:18px 20px"><div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px">Go-live checklist</div>'+
      gates.map(function(g){ return '<div class="gate">'+(g[1]?'<span class="g-ok">✓</span>':'<span class="g-no">✗</span>')+'<span style="color:var(--t1);font-weight:600">'+g[0]+'</span></div>'; }).join('')+
    '</div>'+
    '<div class="ag-card" style="padding:18px 20px"><div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px">Deployment channels</div>'+
      CH.map(function(c){
        var on = W.channels[c[0]];
        return '<div class="ch-opt'+(on?' is-on':'')+'" onclick="toggleChannel(\''+c[0]+'\')">'+
          '<span style="font-size:1.125rem">'+c[1]+'</span><div style="flex:1">'+
          '<div style="font-size:.8125rem;font-weight:700;color:var(--t1)">'+c[2]+'</div>'+
          '<div style="font-size:.6875rem;color:var(--t3)">'+c[3]+'</div></div>'+
          '<span style="font-weight:800;font-size:.8125rem;color:'+(on?'var(--accent)':'var(--t4)')+'">'+(on?'✓':'')+'</span></div>';
      }).join('')+
    '</div></div><style>@media(max-width:800px){.dep-cols{grid-template-columns:1fr!important}}</style>'+
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:16px 0 8px">Website widget snippet</div>'+
    '<div class="wz-code" id="deployCode">'+snippet+'</div>'+
    '<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">'+
      '<button class="btn btn--ghost btn--sm" onclick="copyDeploy()">📋 Copy Snippet</button>'+
      '<button class="btn btn--ghost" onclick="finishDemo()">✓ Finish Setup (Demo Mode)</button>'+
    '</div>'+
    (gatesOk?'' : '<div style="margin-top:10px;font-size:.75rem;color:#92400E">Complete the checklist to enable live deployment — or finish in Demo Mode and go live later from Connect Channels.</div>');
}
window.toggleChannel = function(k){
  W.channels[k] = !W.channels[k];
  if (k !== 'demo' && W.channels[k]) W.channels.demo = false;
  render();
};
window.copyDeploy = function(){
  navigator.clipboard.writeText(document.getElementById('deployCode').textContent).then(function(){ AG.toast('Snippet copied!','success'); });
};

/* ── Persistence: the wizard saves a real business record ── */
function collectBasics() {
  ['name','website','location','phone','email','whatsapp','reviewLink','bookingLink'].forEach(function(k){
    var el = document.getElementById('f_'+k); if (el) W[k] = el.value.trim();
  });
  Object.keys(W.social).forEach(function(k){
    var el = document.getElementById('f_soc_'+k); if (el) W.social[k] = el.value.trim();
  });
  var n = document.getElementById('f_notes'); if (n) W.notes = n.value.trim();
  var t = document.getElementById('f_type'); if (t && t.value) W.businessType = t.value;
}
function persistDraft() {
  if (!W.name || !W.industryGroup) return null;
  var knowledge = { escalation: W.escalation || '' };
  var manualRules = W.notes ? [W.notes] : [];
  if (!W.bizId) {
    var created = DRA.createBusiness({
      name: W.name, industryGroup: W.industryGroup, businessType: W.businessType,
      website: W.website, phone: W.phone, email: W.email, whatsapp: W.whatsapp,
      location: W.location, reviewLink: W.reviewLink, bookingLink: W.bookingLink,
      selectedAgents: [], knowledge: knowledge, intel: W.intel, manualRules: manualRules, social: W.social,
    });
    DRS.update('businesses', created.id, { setupStatus: 'draft' });
    W.bizId = created.id;
  } else {
    DRS.update('businesses', W.bizId, {
      name: W.name, industryGroup: W.industryGroup, businessType: W.businessType,
      website: W.website, phone: W.phone, email: W.email, whatsapp: W.whatsapp,
      location: W.location, reviewLink: W.reviewLink, bookingLink: W.bookingLink,
      knowledge: knowledge, intel: W.intel, manualRules: manualRules, social: W.social,
      testPassed: W.tested || undefined,
    });
  }
  return biz();
}
window.saveDraft = function(){
  if (W.step === 1) collectBasics();
  if (W.step === 3) saveReview();
  if (!W.name) return AG.toast('Add a business name first','error');
  if (!W.industryGroup) return AG.toast('Select an industry group first','error');
  persistDraft();
  renderHeader();
  AG.toast('Draft saved — "'+W.name+'" is now in your Businesses list','success');
};

/* ── Import ──────────────────────────────────────────────── */
function runImportNow() {
  if (W.importing) return;
  W.importing = true;
  var con = document.getElementById('impConsole');
  con.innerHTML = '<div class="imp-head">▸ Starting Business Intelligence Import for '+DRUI.esc(W.name)+'…</div>';
  function line(html){ var d=document.createElement('div'); d.className='imp-line'; d.innerHTML=html; con.appendChild(d); con.scrollTop=con.scrollHeight; }
  var headers = { website:false, google:false, social:false };
  DRI.runImport(W, W.social, function(mod, item, ok){
    if (!headers[mod]) {
      headers[mod] = true;
      line('<span class="imp-head">'+(mod==='website'?'▸ Crawling website pages…':mod==='google'?'▸ Importing public business profile…':'▸ Analysing social profiles…')+'</span>');
    }
    line(ok ? '<span class="imp-ok">✓</span> '+item+' — imported' : '<span class="imp-warn">⚠</span> '+item+' — not found, skipped');
  }).then(function(intel){
    W.intel = intel; W.importDone = true; W.importing = false;
    persistDraft();
    line('<span class="imp-head">▸ Extraction complete — saved to the business.</span>');
    line('<span class="imp-ok">✓</span> '+intel.services.length+' services · '+intel.faqs.length+' FAQs · hours · pricing');
    if (intel.missing.length) line('<span class="imp-warn">⚠</span> Missing: '+intel.missing.join(', '));
    document.getElementById('impSummary').innerHTML = [
      ['📄', intel.pagesFound.length, 'Pages crawled'], ['🛠️', intel.services.length, 'Services'],
      ['❓', intel.faqs.length, 'FAQs'], ['⭐', intel.google.rating+'★', 'Google rating'],
    ].map(function(s){ return '<div class="imp-stat"><b>'+s[1]+'</b><span>'+s[0]+' '+s[2]+'</span></div>'; }).join('');
    renderSteps();
    AG.toast('Import complete — review the results','success');
  });
}

/* ── Selection / training ────────────────────────────────── */
window.pickGroup = function(id){
  collectBasics();
  if (W.industryGroup !== id) { W.businessType = null; W.selectedAgents = []; }
  W.industryGroup = id || null; render();
};
window.toggleAgent = function(type, on){
  var i = W.selectedAgents.indexOf(type);
  if (on && i===-1) W.selectedAgents.push(type);
  if (!on && i!==-1) W.selectedAgents.splice(i,1);
  var row = document.getElementById('wzag_'+type);
  if (row) row.classList.toggle('is-on', on);
};
window.trainNow = function(){
  var b = biz();
  if (!b) { AG.toast('Save the business first','error'); return; }
  var btn = document.getElementById('btnTrain');
  btn.disabled = true; btn.textContent = 'Training on all knowledge sources…';
  DRA.trainAll(b.id, function(a, st){
    var el = document.getElementById('trs_'+a.agentType);
    if (el) el.innerHTML = DRUI.trainBadge(st);
    var bar = document.getElementById('trb_'+a.agentType);
    if (bar && st==='training') bar.style.width = '100%';
  }, function(){
    W.trained = true;
    btn.textContent = '✓ All Employees Trained';
    document.getElementById('trainSummary').innerHTML = trainSummaryHtml();
    renderHeader();
    AG.toast('All AI employees trained!','success');
  });
};

/* ── Tester (real business, real engine, real records) ───── */
function firstAgent() {
  var b = biz(); if (!b) return null;
  var agents = DRS.list('agents',{businessId:b.id});
  return agents.find(function(a){ return a.agentType === (W.selectedAgents[0]||'website-enquiry'); }) || agents[0] || null;
}
function addTestMsg(role, text){
  W.testerMsgs.push({role:role,text:text});
  var el = document.getElementById('testBody'); if(!el) return;
  var d = document.createElement('div'); d.className = 'wz-msg '+role; d.textContent = text;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function testGreet(){
  addTestMsg('in', "Hi! 👋 I'm the AI employee for "+(W.name||'this business')+". Try the category tests above, or ask anything a "+(W.industryGroup==='childcare'?'parent':'customer')+" would.");
}
window.runScenario = function(text){
  var inp = document.getElementById('testInput'); inp.value = text; testSend();
};
window.testSend = function(){
  var b = biz(); var agent = firstAgent();
  if (!b || !agent) return AG.toast('Save the business and select employees first','error');
  if (agent.trainingStatus !== 'ready') return AG.toast('Train the employees first (previous step)','error');
  var inp = document.getElementById('testInput');
  var v = inp.value.trim(); if(!v) return;
  inp.value='';
  addTestMsg('out', v);
  var res = DRA.converse(b, agent, v, W.testerCtx);
  setTimeout(function(){
    addTestMsg('in', res.reply);
    if (!W.tested) { W.tested = true; DRS.update('businesses', b.id, { testPassed: true }); renderHeader(); }
    var c = res.checks;
    function yn(x){ return x ? '<span class="chk-yes">YES</span>' : '<span class="chk-no">no</span>'; }
    var confCol = { high:'var(--green-t)', medium:'#D97706', low:'#DC2626' }[res.confidence]||'var(--t3)';
    document.getElementById('testChecks').innerHTML =
      '<div class="chk-row"><span>Intent detected</span><b style="color:var(--accent)">'+res.intentLabel+'</b></div>'+
      '<div class="chk-row"><span>Knowledge used</span><b style="font-size:.65625rem;color:var(--t2);text-align:right">'+(res.knowledgeSource||'—')+'</b></div>'+
      '<div class="chk-row"><span>Next action</span><b style="font-size:.65625rem;color:var(--t2)">'+res.nextAction+'</b></div>'+
      '<div class="chk-row"><span>Confidence</span><b style="color:'+confCol+';text-transform:uppercase;font-size:.65625rem">'+res.confidence+'</b></div>'+
      '<div class="chk-row"><span>Fallback used</span>'+yn(res.fallbackUsed)+'</div>'+
      '<div class="chk-row"><span>Enquiry captured</span>'+yn(c.leadCaptured)+'</div>'+
      '<div class="chk-row"><span>Booking offered</span>'+yn(c.bookingOffered)+'</div>'+
      '<div class="chk-row"><span>Follow-up triggered</span>'+yn(c.followUpSuggested && c.leadCaptured)+'</div>'+
      '<div class="chk-row"><span>Escalation needed</span>'+yn(c.escalationNeeded)+'</div>'+
      '<div class="chk-row"><span>Data saved</span>'+yn(c.dataSaved)+'</div>'+
      (res.actions.length?'<div style="font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:10px 0 6px">Actions taken</div>'+
        res.actions.map(function(a){ return '<div style="display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--green-bg);border:1px solid #A7F3D0;border-radius:7px;font-size:.71875rem;font-weight:600;color:var(--green-t);margin-bottom:5px">'+a.icon+' '+a.label+'</div>'; }).join(''):'');
    if (c.leadCaptured && !W.testerConvSaved) {
      DRA.logConversation(b, agent, W.testerMsgs, W.testerCtx.leadId);
      W.testerConvSaved = true;
    }
  }, 550);
};

/* ── Finish / deploy ─────────────────────────────────────── */
window.finishDemo = function(){
  var b = persistDraft();
  if (!b) return AG.toast('Complete the basics first','error');
  DRS.update('businesses', b.id, { setupStatus: 'demo', deployChannels: ['demo'] });
  AG.toast(W.name+' finished in Demo Mode — go live any time from Connect Channels','success');
  setTimeout(function(){ window.location.href = '/agents/businesses/' + b.slug; }, 800);
};
function deployLive() {
  var b = persistDraft();
  if (!b) return AG.toast('Complete the basics first','error');
  var chans = Object.keys(W.channels).filter(function(k){ return k!=='demo' && W.channels[k]; });
  var kbOk = !!(W.intel || Object.keys(b.knowledge||{}).length);
  if (!W.trained)                 return AG.toast('Train the employees first (step 5)','error');
  if (!kbOk)                      return AG.toast('The employee has no knowledge — run the import','error');
  if (!W.selectedAgents.length)   return AG.toast('Select at least one AI employee','error');
  if (!W.tested)                  return AG.toast('Run at least one test before going live (step 6)','error');
  if (!chans.length)              return AG.toast('Select a live deployment channel — or use "Finish Setup (Demo Mode)"','error');
  DRS.update('businesses', b.id, { setupStatus: 'live', deployChannels: chans, testPassed: true });
  AG.toast('🎉 '+W.name+' is LIVE on: '+chans.join(', '),'success');
  setTimeout(function(){ window.location.href = '/agents/businesses/' + b.slug; }, 900);
}

/* ── Navigation ──────────────────────────────────────────── */
window.wzBack = function(){
  if (W.step<=1) return;
  if (W.step===3) saveReview();
  W.step--; render();
};
window.wzNext = function(){
  if (W.step===1) {
    collectBasics();
    if (!W.name) return AG.toast('Business name is required','error');
    if (!W.website) return AG.toast('Website URL is required — it powers the import','error');
    if (!W.industryGroup) return AG.toast('Select an industry group','error');
    if (!W.businessType) return AG.toast('Select a business type','error');
    if (!W.selectedAgents.length) {
      W.selectedAgents = DRD.agentsFor(W.industryGroup).filter(function(a){return a.recommended;}).map(function(a){return a.type;});
    }
    persistDraft();
    AG.toast('Business saved as draft','success');
  }
  if (W.step===2 && !W.importDone) { runImportNow(); return; }
  if (W.step===3) { saveReview(); AG.toast('Approved knowledge saved','success'); }
  if (W.step===4) {
    if (!W.selectedAgents.length) return AG.toast('Select at least one AI employee','error');
    DRA.syncAgents(biz(), W.selectedAgents);
    W.trained = false;
    AG.toast(W.selectedAgents.length+' AI employees added to '+W.name,'success');
  }
  if (W.step===5 && !W.trained) return AG.toast('Click "⚡ Train All Employees" first','error');
  if (W.step===6 && !W.tested) return AG.toast('Run at least one test scenario first','error');
  if (W.step===7) { deployLive(); return; }
  W.step++; render();
};

render();
</script>
</body>
</html>
