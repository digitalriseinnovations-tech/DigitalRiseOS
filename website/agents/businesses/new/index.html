<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Daycare Setup — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .wz-steps { display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px; }
    .wz-step { display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:99px;font-size:.6875rem;font-weight:700;color:var(--t4);white-space:nowrap;background:var(--bg-alt);border:1.5px solid transparent;transition:all .2s;cursor:default; }
    .wz-step .n { width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:.5625rem;font-weight:800;flex-shrink:0; }
    .wz-step.is-active { background:var(--accent-bg);color:var(--accent);border-color:var(--accent); }
    .wz-step.is-active .n { background:var(--accent);color:#fff; }
    .wz-step.is-done { color:var(--green-t);background:var(--green-bg); }
    .wz-step.is-done .n { background:var(--green);color:#fff; }
    .journey { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px; }
    .j-chip { font-size:.625rem;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--bg-alt);color:var(--t4);border:1px solid var(--border); }
    .j-chip.on { background:var(--green-bg);color:var(--green-t);border-color:#A7F3D0; }
    .wz-panel { display:none; } .wz-panel.is-active { display:block;animation:wzIn .25s ease; }
    @keyframes wzIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wz-title { font-size:1.25rem;font-weight:800;color:var(--t1);margin-bottom:4px;letter-spacing:-.01em; }
    .wz-sub { font-size:.8438rem;color:var(--t3);margin-bottom:22px; }

    .skill-card { display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:15px 16px;transition:all .15s; }
    .skill-card.is-on { border-color:var(--accent);background:var(--accent-bg); }
    .skill-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px; }
    .skill-ico { width:38px;height:38px;border-radius:10px;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0; }
    .skill-card.is-on .skill-ico { background:#fff; }
    .wz-rec { font-size:.5625rem;font-weight:800;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent);border-radius:99px;padding:1px 7px;letter-spacing:.04em; }
    .sw { position:relative;width:36px;height:20px;flex-shrink:0;margin-left:auto;margin-top:2px;cursor:pointer; }
    .sw input { opacity:0;width:0;height:0; }
    .sw .tr { position:absolute;inset:0;background:var(--border);border-radius:99px;transition:.2s; }
    .sw .tr::before { content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sw input:checked + .tr { background:var(--accent); }
    .sw input:checked + .tr::before { transform:translateX(16px); }

    .imp-console { background:#0F172A;border-radius:var(--radius-xl);padding:20px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;min-height:180px;max-height:280px;overflow-y:auto;line-height:1.9; }
    .imp-line { display:flex;gap:8px;align-items:center;animation:wzIn .2s ease; }
    .imp-ok { color:#4ADE80; } .imp-warn { color:#FBBF24; } .imp-head { color:#818CF8;font-weight:700;margin-top:6px; }
    .rv-sec { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px; }
    .rv-sec .rv-h { display:flex;align-items:center;gap:8px;font-size:.78125rem;font-weight:800;color:var(--t1);margin-bottom:8px; }
    .rv-src { font-size:.5625rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--accent-bg);color:var(--accent);letter-spacing:.04em; }
    .src-row { display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-s);font-size:.8125rem; }
    .src-row:last-child { border:none; }
    .tr-row { display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px; }
    .tr-bar { flex:1;height:5px;border-radius:99px;background:var(--border-s);overflow:hidden;max-width:180px; }
    .tr-bar > div { height:100%;border-radius:99px;background:var(--accent);width:0%;transition:width 1.1s ease; }
    .chk-yes { color:var(--green-t);font-weight:800; } .chk-no { color:var(--t4);font-weight:700; }

    .sc-chips { display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px; }
    .sc-chip { padding:6px 12px;border:1.5px solid var(--accent);border-radius:99px;font-size:.71875rem;font-weight:600;color:var(--accent);background:var(--card);cursor:pointer;transition:all .15s; }
    .sc-chip:hover { background:var(--accent);color:#fff; }
    .sc-chip b { font-weight:800;opacity:.65;margin-right:4px;font-size:.625rem;text-transform:uppercase; }
    .wz-chat { display:grid;grid-template-columns:1fr 300px;gap:14px; }
    @media(max-width:800px){ .wz-chat{grid-template-columns:1fr} }
    .wz-chat-main { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);display:flex;flex-direction:column;height:430px;overflow:hidden; }
    .wz-chat-body { flex:1;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:9px; }
    .wz-msg { max-width:80%;padding:9px 13px;border-radius:12px;font-size:.8125rem;line-height:1.5;white-space:pre-wrap; }
    .wz-msg.in  { background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px; }
    .wz-msg.out { background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px; }
    .chk-row { display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-s);font-size:.71875rem;gap:8px; }
    .chk-row:last-child { border:none; }

    .gate { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-s);font-size:.8125rem; }
    .gate:last-child { border:none; }
    .gate .g-ok { color:var(--green-t);font-weight:800; } .gate .g-no { color:#DC2626;font-weight:800; }
    .ch-opt { display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:all .15s; }
    .ch-opt.is-on { border-color:var(--accent);background:var(--accent-bg); }
    .wz-code { background:#1E293B;border-radius:var(--radius);padding:14px 16px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;line-height:1.7;overflow-x:auto;white-space:pre; }
    .wz-footer { display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap; }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content">
      <div id="ph"></div>
      <div class="wz-steps" id="wzSteps"></div>
      <div class="journey" id="journey"></div>
      <div id="wzPanels"></div>
      <div class="wz-footer">
        <div style="display:flex;gap:10px">
          <button class="btn btn--ghost" id="btnBack" onclick="wzBack()">← Back</button>
          <button class="btn btn--ghost" id="btnDraft" onclick="saveDraft()">💾 Save Draft</button>
        </div>
        <button class="btn btn--primary" id="btnNext" onclick="wzNext()">Continue →</button>
      </div>
    </main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-import.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
DRUI.init({ nav:'new-setup' });

var W = {
  step: 1, bizId: null,
  name:'', website:'', businessType:'Daycare', industryGroup:'childcare',
  location:'', phone:'', email:'', whatsapp:'', reviewLink:'', bookingLink:'', notes:'',
  social: { instagram:'', facebook:'', linkedin:'', tiktok:'', youtube:'' },
  ops: {},                       /* Step 2 — operations & parent info → knowledge */
  skills: [],                    /* Step 3 — daycare skill ids */
  handoff: { adminEmail:'', senderName:'', whatsapp:'', sheets:'', zapier:'', make:'', crm:'', mode:'dashboard' },
  intel: null, importDone:false, importing:false, escalation:'',
  trained: false, tested: false,
  channels: { portal:true, widget:false, whatsapp:false, email:false, webhook:false, demo:true },
  testerCtx: {}, testerMsgs: [], testerConvSaved:false,
};
var STEPS = ['Daycare Profile','Operations & Parents','AI Employee Skills','Communication & Handoff','Knowledge & Training','Test','Deploy'];
var OPS_FIELDS = [
  ['ageGroups','Age Groups Served','e.g. Infants 6–18mo, Toddlers, Preschool',false],
  ['programs','Programs Offered','Full-time, part-time, before/after school…',true],
  ['hours','Hours of Operation','e.g. Mon–Fri 7:30 AM – 6:00 PM',false],
  ['tourTimes','Tour Availability & Process','e.g. Tue & Thu 10 AM, Sat mornings. 30 min, book ahead.',false],
  ['waitlistRules','Waitlist Availability & Process','Free to join? Deposit? Priority rules?',false],
  ['feesVisibility','Fees Visibility Rule','Share fees in chat, or capture contact and send fee sheet?',false],
  ['fees','Fees','Rates per age group…',true],
  ['subsidyNotes','Subsidy / CWELCC Info','CWELCC participation, regional subsidies…',true],
  ['meals','Meals & Snacks','Hot lunch? Snacks? Meal routine…',true],
  ['allergyNotes','Allergy & Special Diet Support','Nut-free? Individual allergy plans? Special diets…',true],
  ['sickPolicy','Sick Policy Summary','Symptom-free rules, exclusion periods…',true],
  ['holidayClosures','Holiday Closure Notes','e.g. Closed stat holidays, Dec 24–Jan 2',false],
  ['napOutdoor','Naps / Outdoor Play / General Notes','Nap schedule, outdoor time, what to bring…',true],
];

function biz() { return W.bizId ? DRS.get('businesses', W.bizId) : null; }

function renderHeader() {
  var b = biz();
  var badge = b ? DRA.setupBadge(DRA.bizSetupStatus(b)) : '<span class="badge badge--gray">Not saved yet</span>';
  document.getElementById('ph').innerHTML = DRUI.pageHeader('New Daycare Setup',
    'Train and deploy a Daycare AI Employee — profile, knowledge, skills, testing and launch.',
    badge);
  /* Setup journey chips */
  var opsFilled = Object.keys(W.ops).filter(function(k){return W.ops[k];}).length;
  var J = [
    ['Profile Saved', !!b],
    ['Daycare Details', opsFilled >= 4],
    ['Skills Selected', W.skills.length > 0],
    ['Knowledge Imported', !!W.intel],
    ['Trained', W.trained],
    ['Test Passed', W.tested],
    ['Live Ready', W.trained && W.tested && !!b],
    ['Live', b && DRA.bizSetupStatus(b) === 'live'],
  ];
  document.getElementById('journey').innerHTML = J.map(function(j){
    return '<span class="j-chip'+(j[1]?' on':'')+'">'+(j[1]?'✓ ':'')+j[0]+'</span>';
  }).join('');
}

function renderSteps() {
  renderHeader();
  document.getElementById('wzSteps').innerHTML = STEPS.map(function(s,i){
    var n = i+1;
    var cls = n === W.step ? ' is-active' : n < W.step ? ' is-done' : '';
    return '<div class="wz-step'+cls+'"><span class="n">'+(n < W.step ? '✓' : n)+'</span>'+s+'</div>';
  }).join('');
  document.getElementById('btnBack').style.visibility = W.step === 1 ? 'hidden' : 'visible';
  var next = document.getElementById('btnNext');
  next.textContent = W.step === 7 ? '🚀 Launch Daycare AI Employee'
    : W.step === 5 ? (W.importDone ? (W.trained ? 'Continue →' : 'Continue (train first!)') : '⚡ Run Knowledge Import') : 'Continue →';
}
function panel(n, html) { return '<div class="wz-panel'+(n===W.step?' is-active':'')+'" id="wz'+n+'">'+html+'</div>'; }
function fld(id,label,ph) {
  return '<div class="ag-form-group"><label class="ag-label">'+label+'</label>'+
    '<input class="ag-input" id="f_'+id+'" placeholder="'+ph+'" value="'+DRUI.esc(id.indexOf('soc_')===0 ? W.social[id.slice(4)] : (W[id]||''))+'"></div>';
}
function hfld(id,label,ph) {
  return '<div class="ag-form-group"><label class="ag-label">'+label+'</label>'+
    '<input class="ag-input" id="h_'+id+'" placeholder="'+ph+'" value="'+DRUI.esc(W.handoff[id]||'')+'"></div>';
}

function render() {
  renderSteps();
  var h = '';

  /* 1 — Daycare Profile */
  var types = DRD.group('childcare').types;
  h += panel(1,
    '<div class="wz-title">Daycare Profile</div>'+
    '<div class="wz-sub">The basics your Daycare AI Employee introduces itself with. Saved as a draft when you continue.</div>'+
    '<div class="ag-form-row">'+fld('name','Daycare Name *','e.g. Sunshine Nursery')+fld('website','Website URL *','e.g. sunshinenursery.ca')+'</div>'+
    '<div class="ag-form-row"><div class="ag-form-group"><label class="ag-label">Daycare Type *</label>'+
      '<select class="ag-select" id="f_type">'+types.map(function(t){ return '<option'+(W.businessType===t?' selected':'')+'>'+t+'</option>'; }).join('')+'</select></div>'+
      fld('location','City / Location','City, Province')+'</div>'+
    '<div class="ag-form-row">'+fld('phone','Phone','+1 …')+fld('email','Email','hello@…')+'</div>'+
    '<div class="ag-form-row">'+fld('whatsapp','WhatsApp Number','+1 …')+fld('reviewLink','Google Review Link','https://g.page/r/…')+'</div>'+
    '<div class="ag-form-row">'+fld('bookingLink','Booking Link (if any)','https://…')+fld('soc_instagram','Instagram','https://instagram.com/…')+'</div>'+
    '<div class="ag-form-row">'+fld('soc_facebook','Facebook','https://facebook.com/…')+fld('soc_linkedin','LinkedIn','https://linkedin.com/…')+'</div>'+
    '<div class="ag-form-group"><label class="ag-label">Internal notes for the AI Employee</label><textarea class="ag-textarea" id="f_notes" style="min-height:52px" placeholder="Special rules, tone notes, things the AI should know…">'+DRUI.esc(W.notes)+'</textarea></div>');

  /* 2 — Operations & Parent Information */
  h += panel(2,
    '<div class="wz-title">Daycare Operations & Parent Information</div>'+
    '<div class="wz-sub">This is what parents ask about every day — the AI Employee answers only from what you approve here (plus the website import later).</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px">'+
    OPS_FIELDS.map(function(f){
      var v = DRUI.esc(W.ops[f[0]]||'');
      return '<div class="ag-form-group"><label class="ag-label">'+f[1]+'</label>'+
        (f[3] ? '<textarea class="ag-textarea" style="min-height:60px" id="op_'+f[0]+'" placeholder="'+f[2]+'">'+v+'</textarea>'
              : '<input class="ag-input" id="op_'+f[0]+'" placeholder="'+f[2]+'" value="'+v+'">')+'</div>';
    }).join('')+'</div>'+
    '<div class="ag-form-group" style="margin-top:8px"><label class="ag-label">Escalation Contact (who handles complex questions?)</label>'+
    '<input class="ag-input" id="op_escalation" placeholder="e.g. Director Sarah — 905-555-0199" value="'+DRUI.esc(W.escalation)+'"></div>');

  /* 3 — AI Employee Skills */
  h += panel(3,
    '<div class="wz-title">AI Employee Skills</div>'+
    '<div class="wz-sub">Choose what this daycare\'s AI Employee handles. Recommended skills are pre-selected.</div>'+
    '<div class="skill-grid">'+
    DRD.daycareSkills.map(function(s){
      var on = W.skills.indexOf(s.id) !== -1;
      var rec = DRD.recommendedSkills.indexOf(s.id) !== -1;
      return '<div class="skill-card'+(on?' is-on':'')+'" id="sk_'+s.id+'">'+
        '<div class="skill-ico">'+s.icon+'</div>'+
        '<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+
          '<span style="font-size:.8438rem;font-weight:700;color:var(--t1)">'+s.label+'</span>'+
          (rec?'<span class="wz-rec">RECOMMENDED</span>':'')+'</div>'+
        '<div style="font-size:.71875rem;color:var(--t3);margin-top:3px;line-height:1.5">'+s.handles+'</div>'+
        '<div style="font-size:.625rem;color:var(--t4);margin-top:5px">Captures: '+s.captures+' · '+s.triggers+'</div></div>'+
        '<label class="sw"><input type="checkbox" '+(on?'checked':'')+' onchange="toggleSkill(\''+s.id+'\',this.checked)"><span class="tr"></span></label>'+
      '</div>';
    }).join('')+'</div>');

  /* 4 — Communication & Handoff */
  h += panel(4,
    '<div class="wz-title">Communication & Handoff</div>'+
    '<div class="wz-sub">Where the AI Employee sends its work. These are supporting connections behind the AI — honest labels: nothing is called "live" until it\'s actually connected.</div>'+
    '<div class="ag-form-row">'+hfld('adminEmail','Admin Notification Email','alerts@daycare.com')+hfld('senderName','Parent Confirmation Sender Name','e.g. Sunshine Nursery Team')+'</div>'+
    '<div class="ag-form-row">'+hfld('whatsapp','WhatsApp Follow-up Number','+1 … (defaults to daycare WhatsApp)')+hfld('sheets','Google Sheets Destination','Sheet URL — integration ready')+'</div>'+
    '<div class="ag-form-row">'+hfld('zapier','Zapier Webhook','https://hooks.zapier.com/… — integration ready')+hfld('make','Make Webhook','https://hook.make.com/… — integration ready')+'</div>'+
    '<div class="ag-form-row">'+hfld('crm','CRM / API Handoff','Endpoint — integration ready')+
    '<div class="ag-form-group"><label class="ag-label">Default Mode</label>'+
    '<select class="ag-select" id="h_mode">'+
      [['dashboard','Dashboard only (everything lands in the portal)'],['email','Dashboard + email notifications'],['whatsapp','Dashboard + WhatsApp follow-ups'],['webhook','Dashboard + webhook handoff']].map(function(o){
        return '<option value="'+o[0]+'"'+(W.handoff.mode===o[0]?' selected':'')+'>'+o[1]+'</option>';
      }).join('')+'</select></div></div>'+
    '<div style="font-size:.71875rem;color:var(--t4);margin-top:6px">💡 Fields left empty simply stay in "integration ready" state — the AI Employee logs everything in the portal regardless.</div>');

  /* 5 — Knowledge Import & Training */
  h += panel(5, renderKnowledge());

  /* 6 — Test */
  h += panel(6, renderTest());

  /* 7 — Deploy */
  h += panel(7, renderDeploy());

  document.getElementById('wzPanels').innerHTML = h;
  if (W.step === 6 && !W.testerMsgs.length) testGreet();
}

/* ── Step 5: Knowledge Import & Training ─────────────────── */
function renderKnowledge() {
  var i = W.intel || {};
  var srcHtml = [
    ['🌐','Website import: '+(W.website||'—'), !!W.intel, W.intel ? (i.pagesFound||[]).length+' pages' : 'not yet imported'],
    ['🏫','Daycare operations details', Object.keys(W.ops).filter(function(k){return W.ops[k];}).length + ' fields', true],
    ['❓','FAQ entries', !!(i.faqs&&i.faqs.length), (i.faqs||[]).length+' FAQs'],
    ['📝','Notes & prompt rules', !!W.notes, W.notes?'1 note':'none'],
    ['📣','Social & tone hints', Object.keys(W.social).some(function(k){return W.social[k];}), 'tone import'],
    ['⭐','Google review link', !!W.reviewLink, W.reviewLink?'connected':'not set'],
    ['📎','Parent handbook / fee sheet upload', false, 'placeholder — coming soon'],
  ].map(function(s){
    var ok = typeof s[2]==='boolean' ? s[2] : true;
    return '<div class="src-row"><span>'+s[0]+'</span><span style="flex:1;font-weight:600;color:var(--t1)">'+s[1]+'</span>'+
      '<span style="font-size:.6875rem;color:var(--t4)">'+(typeof s[2]==='string'?s[2]:s[3])+'</span>'+
      (ok?'<span class="chk-yes">✓</span>':'<span class="chk-no">—</span>')+'</div>';
  }).join('');

  var reviewHtml = '';
  if (W.intel) {
    function ta(id, val, rows) { return '<textarea class="ag-textarea" id="rv_'+id+'" style="min-height:'+(rows||48)+'px">'+DRUI.esc(val||'')+'</textarea>'; }
    reviewHtml =
      '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:16px 0 8px">Review imported knowledge (edit before training)</div>'+
      '<div class="rv-sec"><div class="rv-h">🏢 Summary <span class="rv-src">WEBSITE</span></div>'+ta('summary', W.intel.summary, 60)+'</div>'+
      '<div class="rv-sec"><div class="rv-h">❓ FAQs ('+(W.intel.faqs||[]).length+') <span class="rv-src">WEBSITE</span></div>'+
        ta('faqs', (W.intel.faqs||[]).map(function(f){return 'Q: '+f.q+'\nA: '+f.a;}).join('\n\n'), 110)+'</div>'+
      '<div class="rv-sec"><div class="rv-h">💰 Pricing Notes <span class="rv-src">WEBSITE</span></div>'+ta('pricingNotes', W.intel.pricingNotes)+'</div>'+
      (W.intel.missing && W.intel.missing.length ? '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:12px;font-size:.75rem;color:#92400E"><b>⚠ Missing:</b> '+W.intel.missing.join(' · ')+'</div>' : '');
  }

  var trainHtml = '';
  if (W.intel) {
    var agentTypes = DRD.skillsToAgents(W.skills);
    trainHtml = '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:16px 0 8px">Train the AI Employee</div>'+
      agentTypes.map(function(t){
        var def = DRD.agentDef('childcare', t) || {name:t, icon:'🤖'};
        var b = biz();
        var real = b ? DRS.list('agents',{businessId:b.id}).find(function(a){return a.agentType===t;}) : null;
        var st = real ? real.trainingStatus : 'not-trained';
        return '<div class="tr-row"><span style="font-size:1.125rem">'+def.icon+'</span>'+
          '<span style="flex:1;font-size:.8125rem;font-weight:700;color:var(--t1)">'+def.name+'</span>'+
          '<div class="tr-bar"><div id="trb_'+t+'" style="width:'+(st==='ready'?'100%':'0')+'"></div></div>'+
          '<span id="trs_'+t+'">'+DRUI.trainBadge(st)+'</span></div>';
      }).join('')+
      '<button class="btn btn--primary" id="btnTrain" onclick="trainNow()" '+(W.trained?'disabled':'')+' style="margin-top:8px">'+(W.trained?'✓ AI Employee Trained':'⚡ Train AI Employee')+'</button>'+
      '<div id="trainSummary" style="margin-top:12px">'+(W.trained?trainSummaryHtml():'')+'</div>';
  }

  return '<div class="wz-title">Knowledge Import & Training</div>'+
    '<div class="wz-sub">Import from the website and public profile, review what was found, then train. The AI only ever answers from approved knowledge.</div>'+
    '<div class="ag-card" style="padding:14px 18px;margin-bottom:14px">'+
      '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:4px">Knowledge sources</div>'+srcHtml+'</div>'+
    '<div class="imp-console" id="impConsole">'+(W.importDone?'<div class="imp-ok">✓ Import complete — review below, then train.</div>':'<div style="color:#64748B">▸ Ready. Click "⚡ Run Knowledge Import" below.</div>')+'</div>'+
    reviewHtml + trainHtml;
}
function trainSummaryHtml() {
  var i = W.intel || {};
  var opsFilled = OPS_FIELDS.filter(function(f){return W.ops[f[0]];}).length;
  var missing = (i.missing||[]).slice();
  if (!W.ops.fees && !i.pricingNotes) missing.push('Fees');
  if (!W.ops.hours && !i.hours) missing.push('Hours');
  if (!W.escalation) missing.push('Escalation contact');
  return '<div class="ag-card" style="padding:14px 18px;background:var(--green-bg);border-color:#A7F3D0">'+
    '<div style="font-size:.8125rem;font-weight:800;color:var(--green-t);margin-bottom:4px">✓ Training complete</div>'+
    '<div style="font-size:.75rem;color:var(--green-t);line-height:1.8">'+
    '• Daycare detail fields: <b>'+opsFilled+'</b> · Website FAQs: <b>'+((i.faqs||[]).length)+'</b> · Pages imported: <b>'+((i.pagesFound||[]).length)+'</b><br>'+
    '• Skills active: <b>'+W.skills.length+'</b> → AI employees ready: <b>'+DRD.skillsToAgents(W.skills).length+'</b><br>'+
    (missing.length?'<span style="color:#92400E">• ⚠ Missing: '+missing.join(', ')+' — the AI will offer staff follow-up for these instead of guessing.</span>':'• No critical gaps found')+
    '</div></div>';
}

/* ── Step 6: Test ────────────────────────────────────────── */
function renderTest() {
  var cats = DRD.scenarioCats.childcare;
  return '<div class="wz-title">Test the AI Employee</div>'+
    '<div class="wz-sub">Run the category tests — each shows detected intent, knowledge used, next action and confidence. Meals and allergy must answer differently!</div>'+
    '<div class="sc-chips">'+cats.map(function(s){
      return '<div class="sc-chip" onclick="runScenario(this.getAttribute(\'data-q\'))" data-q="'+DRUI.esc(s.q)+'"><b>'+s.cat+'</b>'+s.q+'</div>';
    }).join('')+'</div>'+
    '<div class="wz-chat"><div class="wz-chat-main">'+
      '<div class="wz-chat-body" id="testBody"></div>'+
      '<div style="display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)">'+
        '<input class="ag-input" id="testInput" placeholder="Ask as a parent…" style="flex:1" onkeydown="if(event.key===\'Enter\')testSend()">'+
        '<button class="btn btn--primary" onclick="testSend()">Send</button></div></div>'+
      '<div class="ag-card" style="padding:16px;height:430px;overflow-y:auto">'+
        '<div style="font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:8px">Outcome Analysis</div>'+
        '<div id="testChecks"><div style="font-size:.75rem;color:var(--t4)">Run a test to see the analysis…</div></div></div>'+
    '</div>';
}

/* ── Step 7: Deploy ──────────────────────────────────────── */
function renderDeploy() {
  var b = biz();
  var slug = b ? b.slug : DRA.slugify(W.name||'your-daycare');
  var snippet = '&lt;script src="https://digital-rise-os.vercel.app/agents/widget/widget.js"\n        data-business="'+slug+'"\n        data-agent="website-enquiry"&gt;&lt;/script&gt;';
  var kbOk = !!(W.intel || Object.keys(W.ops).filter(function(k){return W.ops[k];}).length);
  var gates = [
    ['Daycare profile saved', !!b],
    ['Knowledge trained', kbOk && W.trained],
    ['Skills selected ('+W.skills.length+')', W.skills.length > 0],
    ['Test completed', W.tested],
  ];
  var gatesOk = gates.every(function(g){ return g[1]; });
  var CH = [
    ['portal','🏠','Daycare Client Portal','The daycare\'s own workspace — always included', true],
    ['widget','💻','Website chat widget','Copy the snippet below onto the daycare website', false],
    ['whatsapp','📲','WhatsApp ready mode','Follow-up sequences prepared — integration ready', false],
    ['email','📧','Email automation ready mode','Parent confirmations + admin alerts — integration ready', false],
    ['webhook','🔗','Webhook ready mode','Zapier / Make / Sheets handoff — integration ready', false],
    ['demo','🎭','Demo mode','Test conversations only — no real messages sent', false],
  ];
  return '<div class="wz-title">Deploy / Launch</div>'+
    '<div class="wz-sub"><b>Demo Mode</b> = simulated only. <b>Live Ready</b> = trained + tested, waiting on a channel. <b>Live</b> = answering on a real channel. Honest labels, always.</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="dep-cols">'+
    '<div class="ag-card" style="padding:18px 20px"><div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px">Launch checklist</div>'+
      gates.map(function(g){ return '<div class="gate">'+(g[1]?'<span class="g-ok">✓</span>':'<span class="g-no">✗</span>')+'<span style="color:var(--t1);font-weight:600">'+g[0]+'</span></div>'; }).join('')+
    '</div>'+
    '<div class="ag-card" style="padding:18px 20px"><div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px">Deploy to</div>'+
      CH.map(function(c){
        var on = W.channels[c[0]];
        return '<div class="ch-opt'+(on?' is-on':'')+'" onclick="toggleChannel(\''+c[0]+'\')">'+
          '<span style="font-size:1.125rem">'+c[1]+'</span><div style="flex:1">'+
          '<div style="font-size:.8125rem;font-weight:700;color:var(--t1)">'+c[2]+'</div>'+
          '<div style="font-size:.6875rem;color:var(--t3)">'+c[3]+'</div></div>'+
          '<span style="font-weight:800;font-size:.8125rem;color:'+(on?'var(--accent)':'var(--t4)')+'">'+(on?'✓':'')+'</span></div>';
      }).join('')+
    '</div></div><style>@media(max-width:800px){.dep-cols{grid-template-columns:1fr!important}}</style>'+
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:16px 0 8px">Website widget snippet</div>'+
    '<div class="wz-code" id="deployCode">'+snippet+'</div>'+
    '<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">'+
      '<button class="btn btn--ghost btn--sm" onclick="copyDeploy()">📋 Copy Snippet</button>'+
      '<button class="btn btn--ghost" onclick="finishDemo()">✓ Finish in Demo Mode</button>'+
    '</div>'+
    (gatesOk?'' : '<div style="margin-top:10px;font-size:.75rem;color:#92400E">Complete the checklist to launch — or finish in Demo Mode and launch later.</div>');
}
window.toggleChannel = function(k){
  if (k === 'portal') return; /* portal always included */
  W.channels[k] = !W.channels[k];
  if (k !== 'demo' && W.channels[k]) W.channels.demo = false;
  render();
};
window.copyDeploy = function(){
  navigator.clipboard.writeText(document.getElementById('deployCode').textContent).then(function(){ AG.toast('Snippet copied!','success'); });
};

/* ── Persistence ─────────────────────────────────────────── */
function collectProfile() {
  ['name','website','location','phone','email','whatsapp','reviewLink','bookingLink'].forEach(function(k){
    var el = document.getElementById('f_'+k); if (el) W[k] = el.value.trim();
  });
  Object.keys(W.social).forEach(function(k){
    var el = document.getElementById('f_soc_'+k); if (el) W.social[k] = el.value.trim();
  });
  var n = document.getElementById('f_notes'); if (n) W.notes = n.value.trim();
  var t = document.getElementById('f_type'); if (t && t.value) W.businessType = t.value;
}
function collectOps() {
  OPS_FIELDS.forEach(function(f){
    var el = document.getElementById('op_'+f[0]);
    if (el) { if (el.value.trim()) W.ops[f[0]] = el.value.trim(); else delete W.ops[f[0]]; }
  });
  var e = document.getElementById('op_escalation'); if (e) W.escalation = e.value.trim();
}
function collectHandoff() {
  ['adminEmail','senderName','whatsapp','sheets','zapier','make','crm'].forEach(function(k){
    var el = document.getElementById('h_'+k); if (el) W.handoff[k] = el.value.trim();
  });
  var m = document.getElementById('h_mode'); if (m) W.handoff.mode = m.value;
}
function knowledgeObj() {
  return Object.assign({ escalation: W.escalation || '' }, W.ops);
}
function persistDraft() {
  if (!W.name) return null;
  if (!W.bizId) {
    var created = DRA.createBusiness({
      name: W.name, industryGroup: 'childcare', businessType: W.businessType,
      website: W.website, phone: W.phone, email: W.email, whatsapp: W.whatsapp,
      location: W.location, reviewLink: W.reviewLink, bookingLink: W.bookingLink,
      selectedAgents: [], knowledge: knowledgeObj(), intel: W.intel,
      manualRules: W.notes ? [W.notes] : [], social: W.social,
    });
    DRS.update('businesses', created.id, { setupStatus: 'draft', skills: W.skills, handoff: W.handoff });
    W.bizId = created.id;
  } else {
    DRS.update('businesses', W.bizId, {
      name: W.name, businessType: W.businessType,
      website: W.website, phone: W.phone, email: W.email, whatsapp: W.whatsapp,
      location: W.location, reviewLink: W.reviewLink, bookingLink: W.bookingLink,
      knowledge: knowledgeObj(), intel: W.intel,
      manualRules: W.notes ? [W.notes] : [], social: W.social,
      skills: W.skills, handoff: W.handoff,
      testPassed: W.tested || undefined,
    });
  }
  return biz();
}
window.saveDraft = function(){
  if (W.step === 1) collectProfile();
  if (W.step === 2) collectOps();
  if (W.step === 4) collectHandoff();
  saveReviewEdits();
  if (!W.name) return AG.toast('Add the daycare name first','error');
  persistDraft();
  renderHeader();
  AG.toast('Draft saved — "'+W.name+'" is in your Daycare Clients list','success');
};
function saveReviewEdits() {
  if (!W.intel) return;
  var g = function(id){ var el = document.getElementById('rv_'+id); return el ? el.value.trim() : null; };
  var s = g('summary'); if (s) W.intel.summary = s;
  var fq = g('faqs');
  if (fq !== null) {
    W.intel.faqs = fq.split(/\n\s*\n/).map(function(block){
      var m = block.match(/Q:\s*([\s\S]*?)\nA:\s*([\s\S]*)/);
      return m ? { q:m[1].trim(), a:m[2].trim() } : null;
    }).filter(Boolean);
  }
  var pn = g('pricingNotes'); if (pn !== null) W.intel.pricingNotes = pn;
}

/* ── Import + Training ───────────────────────────────────── */
function runImportNow() {
  if (W.importing) return;
  W.importing = true;
  var con = document.getElementById('impConsole');
  con.innerHTML = '<div class="imp-head">▸ Importing knowledge for '+DRUI.esc(W.name)+'…</div>';
  function line(html){ var d=document.createElement('div'); d.className='imp-line'; d.innerHTML=html; con.appendChild(d); con.scrollTop=con.scrollHeight; }
  var headers = { website:false, google:false, social:false };
  DRI.runImport(W, W.social, function(mod, item, ok){
    if (!headers[mod]) {
      headers[mod] = true;
      line('<span class="imp-head">'+(mod==='website'?'▸ Crawling website pages…':mod==='google'?'▸ Importing Google business profile…':'▸ Analysing social tone…')+'</span>');
    }
    line(ok ? '<span class="imp-ok">✓</span> '+item : '<span class="imp-warn">⚠</span> '+item+' — not found');
  }).then(function(intel){
    W.intel = intel; W.importDone = true; W.importing = false;
    persistDraft();
    line('<span class="imp-head">▸ Done.</span> <span class="imp-ok">'+intel.faqs.length+' FAQs · '+intel.services.length+' services · saved to the daycare.</span>');
    render();
    AG.toast('Knowledge imported — review and train below','success');
  });
}
window.toggleSkill = function(id, on){
  var i = W.skills.indexOf(id);
  if (on && i===-1) W.skills.push(id);
  if (!on && i!==-1) W.skills.splice(i,1);
  var card = document.getElementById('sk_'+id);
  if (card) card.classList.toggle('is-on', on);
};
window.trainNow = function(){
  var b = biz();
  if (!b) return AG.toast('Save the daycare first','error');
  saveReviewEdits(); persistDraft();
  DRA.syncAgents(b, DRD.skillsToAgents(W.skills));
  var btn = document.getElementById('btnTrain');
  btn.disabled = true; btn.textContent = 'Training on all knowledge sources…';
  DRA.trainAll(b.id, function(a, st){
    var el = document.getElementById('trs_'+a.agentType);
    if (el) el.innerHTML = DRUI.trainBadge(st);
    var bar = document.getElementById('trb_'+a.agentType);
    if (bar && st==='training') bar.style.width = '100%';
  }, function(){
    W.trained = true;
    btn.textContent = '✓ AI Employee Trained';
    document.getElementById('trainSummary').innerHTML = trainSummaryHtml();
    renderHeader();
    AG.toast('Daycare AI Employee trained!','success');
  });
};

/* ── Tester ──────────────────────────────────────────────── */
function firstAgent() {
  var b = biz(); if (!b) return null;
  var agents = DRS.list('agents',{businessId:b.id});
  return agents.find(function(a){ return a.agentType === 'website-enquiry'; }) || agents[0] || null;
}
function addTestMsg(role, text){
  W.testerMsgs.push({role:role,text:text});
  var el = document.getElementById('testBody'); if(!el) return;
  var d = document.createElement('div'); d.className = 'wz-msg '+role; d.textContent = text;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function testGreet(){
  addTestMsg('in', "Hi! 👋 I'm the AI Employee for "+(W.name||'this daycare')+". Try the parent questions above — meals and allergy should answer differently!");
}
window.runScenario = function(text){
  var inp = document.getElementById('testInput'); inp.value = text; testSend();
};
window.testSend = function(){
  var b = biz(); var agent = firstAgent();
  if (!b || !agent) return AG.toast('Save the daycare and train first','error');
  if (agent.trainingStatus !== 'ready') return AG.toast('Train the AI Employee first (previous step)','error');
  var inp = document.getElementById('testInput');
  var v = inp.value.trim(); if(!v) return;
  inp.value='';
  addTestMsg('out', v);
  var res = DRA.converse(b, agent, v, W.testerCtx);
  setTimeout(function(){
    addTestMsg('in', res.reply);
    if (!W.tested) { W.tested = true; DRS.update('businesses', b.id, { testPassed: true }); renderHeader(); }
    var c = res.checks;
    function yn(x){ return x ? '<span class="chk-yes">YES</span>' : '<span class="chk-no">no</span>'; }
    var confCol = { high:'var(--green-t)', medium:'#D97706', low:'#DC2626' }[res.confidence]||'var(--t3)';
    document.getElementById('testChecks').innerHTML =
      '<div class="chk-row"><span>Intent detected</span><b style="color:var(--accent)">'+res.intentLabel+'</b></div>'+
      '<div class="chk-row"><span>Knowledge used</span><b style="font-size:.65625rem;color:var(--t2);text-align:right">'+(res.knowledgeSource||'—')+'</b></div>'+
      '<div class="chk-row"><span>Next action</span><b style="font-size:.65625rem;color:var(--t2)">'+res.nextAction+'</b></div>'+
      '<div class="chk-row"><span>Confidence</span><b style="color:'+confCol+';text-transform:uppercase;font-size:.65625rem">'+res.confidence+'</b></div>'+
      '<div class="chk-row"><span>Fallback used</span>'+yn(res.fallbackUsed)+'</div>'+
      '<div class="chk-row"><span>Enquiry captured</span>'+yn(c.leadCaptured)+'</div>'+
      '<div class="chk-row"><span>Booking offered</span>'+yn(c.bookingOffered)+'</div>'+
      '<div class="chk-row"><span>Escalation needed</span>'+yn(c.escalationNeeded)+'</div>'+
      (res.actions.length?'<div style="font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:10px 0 6px">AI actions</div>'+
        res.actions.map(function(a){ return '<div style="display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--green-bg);border:1px solid #A7F3D0;border-radius:7px;font-size:.71875rem;font-weight:600;color:var(--green-t);margin-bottom:5px">'+a.icon+' '+a.label+'</div>'; }).join(''):'');
    if (c.leadCaptured && !W.testerConvSaved) {
      DRA.logConversation(b, agent, W.testerMsgs, W.testerCtx.leadId);
      W.testerConvSaved = true;
    }
  }, 550);
};

/* ── Finish / launch ─────────────────────────────────────── */
window.finishDemo = function(){
  collectHandoff();
  var b = persistDraft();
  if (!b) return AG.toast('Complete the profile first','error');
  DRS.update('businesses', b.id, { setupStatus: 'demo', deployChannels: ['portal','demo'] });
  AG.toast(W.name+' finished in Demo Mode — launch any time from Connect Channels','success');
  setTimeout(function(){ window.location.href = '/agents/businesses/' + b.slug; }, 800);
};
function launchLive() {
  collectHandoff();
  var b = persistDraft();
  if (!b) return AG.toast('Complete the profile first','error');
  var chans = Object.keys(W.channels).filter(function(k){ return k!=='demo' && W.channels[k]; });
  if (!W.trained)               return AG.toast('Train the AI Employee first (step 5)','error');
  if (!W.skills.length)         return AG.toast('Select at least one skill (step 3)','error');
  if (!W.tested)                return AG.toast('Run at least one test before launching (step 6)','error');
  var liveChans = chans.filter(function(c){ return c!=='portal'; });
  if (!liveChans.length) {
    DRS.update('businesses', b.id, { setupStatus: 'demo', deployChannels: chans });
    AG.toast('Launched to the client portal in Demo Mode — connect a live channel to go fully live','success');
  } else {
    DRS.update('businesses', b.id, { setupStatus: 'live', deployChannels: chans, testPassed: true });
    AG.toast('🎉 '+W.name+' AI Employee is LIVE on: '+chans.join(', '),'success');
  }
  setTimeout(function(){ window.location.href = '/agents/businesses/' + b.slug; }, 900);
}

/* ── Navigation ──────────────────────────────────────────── */
window.wzBack = function(){
  if (W.step<=1) return;
  if (W.step===2) collectOps();
  if (W.step===4) collectHandoff();
  W.step--; render();
};
window.wzNext = function(){
  if (W.step===1) {
    collectProfile();
    if (!W.name) return AG.toast('Daycare name is required','error');
    if (!W.website) return AG.toast('Website URL is required — it powers the knowledge import','error');
    if (!W.skills.length) W.skills = DRD.recommendedSkills.slice();
    persistDraft();
    AG.toast('Daycare profile saved','success');
  }
  if (W.step===2) { collectOps(); persistDraft(); AG.toast('Daycare details saved','success'); }
  if (W.step===3) {
    if (!W.skills.length) return AG.toast('Select at least one skill','error');
    persistDraft();
    DRA.syncAgents(biz(), DRD.skillsToAgents(W.skills));
    W.trained = false;
    AG.toast(W.skills.length+' skills selected','success');
  }
  if (W.step===4) { collectHandoff(); persistDraft(); AG.toast('Handoff settings saved','success'); }
  if (W.step===5) {
    if (!W.importDone) { runImportNow(); return; }
    if (!W.trained) return AG.toast('Click "⚡ Train AI Employee" first','error');
    saveReviewEdits(); persistDraft();
  }
  if (W.step===6 && !W.tested) return AG.toast('Run at least one test first','error');
  if (W.step===7) { launchLive(); return; }
  W.step++; render();
};

render();
</script>
</body>
</html>
