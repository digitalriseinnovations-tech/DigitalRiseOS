<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deploy — Digital Rise</title>
  <link rel="stylesheet" href="/agents/shared/agents.css">
  <style>
    .dp-card { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:22px;margin-bottom:16px; }
    .dp-code { background:#1E293B;border-radius:var(--radius);padding:14px 16px;font-family:Consolas,Monaco,monospace;font-size:.75rem;color:#94A3B8;line-height:1.7;overflow-x:auto;white-space:pre;position:relative;margin-top:12px; }
    .dp-copy { position:absolute;top:8px;right:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px 10px;font-size:.6875rem;font-weight:600;color:#94A3B8;cursor:pointer; }
    .dp-copy:hover { background:rgba(255,255,255,.16);color:#E2E8F0; }
    .dp-meta { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:12px; }
    .dp-meta > div { background:var(--bg-alt);border-radius:9px;padding:10px 12px;font-size:.71875rem;color:var(--t3); }
    .dp-meta b { display:block;color:var(--t1);font-size:.75rem;margin-bottom:2px; }
    .seq { display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border-s);font-size:.78125rem; }
    .seq:last-child { border:none; }
    .seq .d { flex-shrink:0;font-weight:800;color:var(--accent);min-width:52px;font-size:.6875rem;padding-top:2px; }
    .msg-bubble { background:var(--bg-alt);border:1px solid var(--border);border-radius:11px;border-bottom-left-radius:3px;padding:9px 13px;font-size:.78125rem;color:var(--t2);line-height:1.5;max-width:440px;margin-top:8px; }
  </style>
</head>
<body class="ag-body">
<div class="ag-layout">
  <aside class="ag-sidebar" id="agSidebar"></aside>
  <div class="ag-main">
    <header class="ag-topbar" id="agTopbar"></header>
    <main class="ag-content" id="content"></main>
  </div>
</div>

<script src="/agents/shared/agents.js"></script>
<script src="/agents/shared/agents-data.js"></script>
<script src="/agents/shared/agents-storage.js"></script>
<script src="/agents/shared/agents-actions.js"></script>
<script src="/agents/shared/agents-ui.js"></script>
<script>
var biz = DRUI.init({ nav:'businesses', bizNav:'deploy', requireBiz:true });
if (biz) render();

function esc(s){ return DRUI.esc(s); }
function agentOf(type){
  return DRS.list('agents',{businessId:biz.id}).filter(function(a){return a.agentType===type;})[0] || null;
}
function head(ico, title, agent, sub){
  var badge = agent
    ? (agent.trainingStatus==='ready' ? '<span class="badge badge--green">● Live — '+esc(agent.agentName)+'</span>' : '<span class="badge badge--amber">Needs training — '+esc(agent.agentName)+'</span>')
    : '<span class="badge badge--gray">No agent deployed</span>';
  return '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">' +
    '<span style="font-size:1.5rem">'+ico+'</span><div style="flex:1;min-width:220px">' +
    '<div style="font-size:.9375rem;font-weight:800;color:var(--t1)">'+title+' '+badge+'</div>' +
    '<div style="font-size:.75rem;color:var(--t3);line-height:1.55;margin-top:3px">'+sub+'</div></div>' +
    (agent?'<a class="btn btn--ghost btn--sm" href="'+DRUI.agentUrl(biz.slug,agent.id)+'">⚙ Configure</a>':'')+'</div>';
}
function meta(items){
  return '<div class="dp-meta">'+items.map(function(m){ return '<div><b>'+m[0]+'</b>'+m[1]+'</div>'; }).join('')+'</div>';
}

function render() {
  var agents = DRS.list('agents', { businessId: biz.id });
  var ready = agents.filter(function(a){return a.trainingStatus==='ready';}).length;
  var tasks = DRS.list('tasks', { businessId: biz.id });

  var h = DRUI.pageHeader('Deploy — '+esc(biz.name),
    'Channel deployments. Each channel is powered by a trained AI employee with its own workflows.');

  if (ready < agents.length) {
    h += '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--radius-lg);padding:13px 18px;margin-bottom:16px;font-size:.8125rem;color:#92400E">' +
      '⚠️ '+(agents.length-ready)+' employee'+(agents.length-ready===1?' is':'s are')+' not trained. <a href="'+DRUI.bizUrl(biz.slug,'agents')+'" style="font-weight:700;color:#92400E">Train them</a> before going live.</div>';
  }

  /* 1 — Website widget */
  var web = agentOf('website-enquiry');
  var primary = web ? 'website-enquiry' : (agents[0]?agents[0].agentType:'website-enquiry');
  var snippet = '<script src="https://digital-rise-os.vercel.app/agents/widget/widget.js"\n' +
    '        data-business="'+biz.slug+'"\n        data-agent="'+primary+'"><\/script>';
  h += '<div class="dp-card">' +
    head('💻','Website Widget', web, 'Floating chat bubble on the client website. Answers from the 5 knowledge layers, qualifies visitors and captures every enquiry.') +
    meta([
      ['Data captured', (DRD.leadFields[biz.industryGroup]||[]).map(function(f){return f.label;}).slice(0,4).join(', ')+'…'],
      ['Follow-up triggered', 'WhatsApp sequence +2h / +24h / +72h'],
      ['After-hours', (web && DRA.jobFor(web).style.afterHours==='capture') ? 'Captures lead, promises morning follow-up' : 'Queues until opening'],
      ['Escalation', (biz.knowledge||{}).escalation || 'Not set — add in Knowledge Base'],
    ]) +
    '<div class="dp-code" id="cWeb"><button class="dp-copy" onclick="copyEl(\'cWeb\')">Copy</button>'+esc(snippet)+'</div>' +
    '<div style="margin-top:10px;display:flex;gap:8px"><a class="btn btn--ghost btn--sm" href="/agents/widget/demo" target="_blank">👁 Preview Widget</a></div></div>';

  /* 2 — WhatsApp follow-up */
  var wa = agentOf('whatsapp-followup');
  h += '<div class="dp-card">' +
    head('📲','WhatsApp Follow-up', wa,
      biz.whatsapp ? 'Connected number: <b>'+esc(biz.whatsapp)+'</b>. Automated 3-touch recovery sequence on every captured lead. '+tasks.filter(function(t){return t.type==='whatsapp-followup';}).length+' follow-ups queued so far.'
                   : 'No WhatsApp number saved — add it in the Knowledge Base to activate this channel.') +
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:14px 0 4px">Live sequence preview</div>' +
    DRD.followUpSequences['whatsapp-followup'].map(function(s){
      return '<div class="seq"><span class="d">'+s.delay+'</span><span style="color:var(--t2)">'+esc(s.msg)+'</span></div>';
    }).join('') +
    meta([['Trigger','New lead captured, booking incomplete, waitlist, no-reply'],['Stop conditions','Reply · booking completed · opt-out · 2 unanswered']]) + '</div>';

  /* 3 — Email AI */
  var em = agentOf('email-inbox');
  h += '<div class="dp-card">' +
    head('📧','Email Inbox AI', em,
      biz.email ? 'Enquiries to <b>'+esc(biz.email)+'</b> get classified by intent (booking / quote / support / complaint), receive an instant drafted reply, and become structured leads.'
                : 'No enquiry email saved — add it in the Knowledge Base.') +
    meta([
      ['Classifies', 'Booking · quote · support · complaint · spam'],
      ['Auto-reply', 'Drafted instantly, on-brand, with the next step'],
      ['Flags urgent', 'Complaints and legal issues → escalation, never auto-answered'],
      ['Follow-up', 'Unanswered enquiry replies bumped after 48h'],
    ]) + '</div>';

  /* 4 — Review AI */
  var rv = agentOf('review');
  var reviewSeq = DRD.followUpSequences['review'];
  h += '<div class="dp-card">' +
    head('⭐','Review & Reputation AI', rv,
      'Requests reviews after positive interactions. Unhappy customers are routed to the manager internally — the public review link is never sent to them.') +
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:14px 0 4px">Request flow</div>' +
    reviewSeq.map(function(s){
      return '<div class="seq"><span class="d">'+s.delay+'</span><span style="color:var(--t2)">'+esc(s.msg.replace('{reviewLink}', biz.reviewLink||'[review link]'))+'</span></div>';
    }).join('') +
    meta([
      ['Review link', biz.reviewLink ? '✓ Connected' : '⚠ Not set — add in Knowledge Base'],
      ['Unhappy routing', (biz.knowledge||{}).escalation || 'Manager (set contact in KB)'],
    ]) + '</div>';

  /* 5 — Missed call recovery */
  var mc = agentOf('missed-call');
  h += '<div class="dp-card">' +
    head('📞','Missed Call Recovery', mc,
      'When '+esc(biz.name)+' misses a call, the caller gets an instant text — before they dial the next business on Google.') +
    '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin:14px 0 4px">Recovery messages</div>' +
    DRD.followUpSequences['missed-call'].map(function(s){
      return '<div class="seq"><span class="d">'+s.delay+'</span><span style="color:var(--t2)">'+esc(s.msg)+'</span></div>';
    }).join('') +
    (mc ? '<div style="margin-top:12px"><button class="btn btn--primary btn--sm" onclick="simulateMissedCall()">▶ Simulate a Missed Call</button></div>' : '') + '</div>';

  /* 6 — Reactivation */
  var ra = agentOf('lead-reactivation');
  h += '<div class="dp-card">' +
    head('🔄','Lead Reactivation', ra,
      'Cold leads older than 30 days get one personal check-in, then one final touch at 60 days.') +
    DRD.followUpSequences['lead-reactivation'].map(function(s){
      return '<div class="seq"><span class="d">'+s.delay+'</span><span style="color:var(--t2)">'+esc(s.msg.replace('{name}','Sarah'))+'</span></div>';
    }).join('') + '</div>';

  document.getElementById('content').innerHTML = h;
}

window.copyEl = function(id){
  var el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent.replace(/^Copy/,'').trim()).then(function(){ AG.toast('Copied!','success'); });
};
window.simulateMissedCall = function(){
  var mc = agentOf('missed-call') || DRS.list('agents',{businessId:biz.id})[0];
  var lead = DRS.create('leads', {
    businessId: biz.id, agentId: mc ? mc.id : null,
    name: 'Missed Caller', phone: '+1 555-01'+Math.floor(10+Math.random()*89), email: '',
    enquiryType: 'Missed Call Recovery', channel: 'phone', status: 'callback-requested',
    qualScore: 70, score: 'warm', urgency: 'routine', priority: 'high',
    lastInteraction: DRS.now(), nextFollowUpDue: new Date(Date.now()+2*3600e3).toISOString(),
    notes: 'Simulated missed call — recovery SMS sent at +1min.',
  });
  DRS.create('tasks', {
    businessId: biz.id, agentId: mc ? mc.id : null, leadId: lead.id,
    type: 'missed-call-recovery', trigger: 'missed-call', status: 'scheduled',
    dueAt: new Date(Date.now()+60e3).toISOString(),
    message: DRD.followUpSequences['missed-call'][0].msg,
  });
  AG.toast('Missed call simulated — recovery message queued, lead created!','success');
  render();
};
</script>
</body>
</html>
