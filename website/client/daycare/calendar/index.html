<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — Sunshine Nursery</title>
  <link rel="stylesheet" href="/client/daycare/shared/client.css">
  <style>
    .cal-layout { display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start; }
    @media(max-width:1000px){.cal-layout{grid-template-columns:1fr}}

    .cal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
    .cal-month { font-size:1.125rem;font-weight:700;color:var(--t1); }
    .cal-nav { display:flex;gap:6px; }
    .cal-nav-btn { width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s; }
    .cal-nav-btn:hover { border-color:var(--accent);color:var(--accent); }

    .cal-grid { display:grid;grid-template-columns:repeat(7,1fr);background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;overflow:hidden; }
    .cal-dow { padding:10px;text-align:center;font-size:.6875rem;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--s1); }
    .cal-day { border-right:1px solid var(--s2);border-bottom:1px solid var(--s2);padding:8px;min-height:100px;position:relative;transition:background .15s;cursor:pointer; }
    .cal-day:nth-child(7n) { border-right:none; }
    .cal-day:hover { background:var(--s1); }
    .cal-day.is-today { background:var(--accent-bg); }
    .cal-day.is-other-month { background:var(--s1);opacity:.5; }
    .cal-day-num { font-size:.8125rem;font-weight:600;color:var(--t3);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between; }
    .cal-day-num.is-today-num { color:var(--accent);font-weight:800; }
    .cal-day-dot { width:6px;height:6px;border-radius:50%;background:var(--accent); }
    .cal-event { padding:2px 5px;border-radius:4px;font-size:.625rem;font-weight:600;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .cal-event--purple { background:#F3F0FF;color:#7C3AED; }
    .cal-event--blue   { background:#EFF6FF;color:#2563EB; }
    .cal-event--green  { background:#F0FDF4;color:#16A34A; }
    .cal-event--amber  { background:#FFFBEB;color:#D97706; }
    .cal-event--red    { background:#FEF2F2;color:#DC2626; }
    .cal-event--teal   { background:#F0FDFA;color:#0D9488; }
    .cal-event--pink   { background:#FDF2F8;color:#DB2777; }

    .event-list { background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;overflow:hidden; }
    .event-list-head { padding:14px 16px;border-bottom:1px solid var(--border);font-size:.875rem;font-weight:700;color:var(--t1); }
    .event-item { display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--s2);cursor:pointer;transition:background .15s; }
    .event-item:last-child { border-bottom:none; }
    .event-item:hover { background:var(--s1); }
    .event-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px; }
    .event-name { font-size:.875rem;font-weight:600;color:var(--t1);margin-bottom:2px; }
    .event-meta { font-size:.75rem;color:var(--t3); }

    .legend { display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px; }
    .legend-item { display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--t3); }
    .legend-dot { width:8px;height:8px;border-radius:2px; }
  </style>
</head>
<body class="cl-body">
  <div class="cl-layout">
    <aside class="cl-sidebar" id="clSidebar"></aside>
    <div class="cl-main-wrap">
      <header class="cl-topbar" id="clTopbar"></header>
      <main class="cl-content">

        <div class="page-header">
          <div>
            <h1 class="page-title">Calendar</h1>
            <p class="page-sub">Events, holidays, tours, and activities</p>
          </div>
          <div class="page-actions">
            <button class="btn btn--ghost" onclick="CL.showToast('Syncing with Google Calendar…','info')">Sync Google</button>
            <button class="btn btn--primary" onclick="CL.showToast('Event creator coming soon','info')">+ Add Event</button>
          </div>
        </div>

        <!-- Legend -->
        <div class="legend" id="calLegend"></div>

        <div class="cal-layout">

          <!-- Main calendar -->
          <div>
            <div class="cal-header">
              <div class="cal-month">June 2026</div>
              <div class="cal-nav">
                <button class="cal-nav-btn">‹</button>
                <button class="cal-nav-btn btn--ghost" style="width:auto;padding:0 10px;font-size:.8125rem">Today</button>
                <button class="cal-nav-btn">›</button>
              </div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </div>

          <!-- Event list -->
          <div>
            <div class="event-list">
              <div class="event-list-head">Upcoming Events</div>
              <div id="eventList"></div>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <div id="panelOverlay"></div>
  <script src="/client/daycare/shared/daycare-data.js"></script>
  <script src="/client/daycare/shared/client.js"></script>
  <script>
    CL.init({ page: 'calendar' });

    const typeColors = {
      holiday:   { cls:'purple', label:'Holiday' },
      tour:      { cls:'blue',   label:'Tour' },
      event:     { cls:'green',  label:'Event' },
      closure:   { cls:'red',    label:'Closure' },
      activity:  { cls:'teal',   label:'Activity' },
      staff:     { cls:'amber',  label:'Staff' },
      birthday:  { cls:'pink',   label:'Birthday' },
    };
    const dotColors = {
      purple:'#7C3AED',blue:'#2563EB',green:'#16A34A',
      red:'#DC2626',teal:'#0D9488',amber:'#D97706',pink:'#DB2777'
    };

    /* Legend */
    document.getElementById('calLegend').innerHTML = Object.entries(typeColors).map(([k,v])=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${dotColors[v.cls]}"></div>
        ${v.label}
      </div>`).join('');

    /* Build event lookup by day (ISO dates: '2026-07-03') */
    const eventsByDay = {};
    DC.calendarEvents.forEach(ev => {
      const d = parseInt((ev.date||'').split('-')[2]||'0');
      if(!eventsByDay[d]) eventsByDay[d]=[];
      eventsByDay[d].push(ev);
    });

    /* Calendar grid — June 2026 starts on Monday */
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

    /* June 1, 2026 = Monday = col 1 (0-indexed), so prefix with 1 empty day (Sunday) */
    html += `<div class="cal-day is-other-month"></div>`;

    for(let d=1;d<=30;d++) {
      const isToday = d===30;
      const evs = eventsByDay[d]||[];
      html += `
        <div class="cal-day ${isToday?'is-today':''}">
          <div class="cal-day-num ${isToday?'is-today-num':''}">${d}${evs.length>0?`<div class="cal-day-dot"></div>`:''}</div>
          ${evs.slice(0,2).map(e=>{
            const tc = typeColors[e.type]||{cls:'purple'};
            return `<div class="cal-event cal-event--${tc.cls}">${e.title}</div>`;
          }).join('')}
          ${evs.length>2?`<div style="font-size:.5625rem;color:var(--t4)">+${evs.length-2} more</div>`:''}
        </div>`;
    }
    /* Fill remaining cells */
    const total = 1 + 30;
    const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
    for(let i=0;i<rem;i++) html += `<div class="cal-day is-other-month"></div>`;

    document.getElementById('calGrid').innerHTML = html;

    /* Event list */
    document.getElementById('eventList').innerHTML = DC.calendarEvents.map(ev => {
      const tc = typeColors[ev.type]||{cls:'purple',label:'Event'};
      return `
        <div class="event-item">
          <div class="event-dot" style="background:${dotColors[tc.cls]}"></div>
          <div>
            <div class="event-name">${ev.title}</div>
            <div class="event-meta">${ev.date} · ${tc.label}${ev.time?` · ${ev.time}`:''}</div>
          </div>
        </div>`;
    }).join('');
  </script>
</body>
</html>
