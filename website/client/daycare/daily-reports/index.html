<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reports — Sunshine Nursery</title>
  <link rel="stylesheet" href="/client/daycare/shared/client.css">
  <style>
    .report-layout { display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start; }
    @media(max-width:900px){.report-layout{grid-template-columns:1fr}}

    .report-list { background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;overflow:hidden; }
    .report-list-head { padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center; }
    .report-list-title { font-size:.875rem;font-weight:700;color:var(--t1); }
    .report-item { display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--s2);cursor:pointer;transition:background .15s; }
    .report-item:last-child { border-bottom:none; }
    .report-item:hover { background:var(--s1); }
    .report-item.is-active { background:var(--accent-bg);border-left:3px solid var(--accent); }
    .report-item-name { font-size:.875rem;font-weight:600;color:var(--t1); }
    .report-item-sub { font-size:.75rem;color:var(--t3);margin-top:1px; }

    .report-builder { background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;padding:24px; }
    .rb-section { margin-bottom:24px; }
    .rb-label { font-size:.6875rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px; }

    .mood-grid { display:flex;gap:8px;flex-wrap:wrap; }
    .mood-opt { width:52px;height:52px;border-radius:12px;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:1.25rem;background:var(--card-bg); }
    .mood-opt span { font-size:.5625rem;font-weight:600;color:var(--t3);margin-top:2px; }
    .mood-opt.is-selected { border-color:var(--accent);background:var(--accent-bg); }

    .meal-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px; }
    .meal-item { padding:10px;border:1.5px solid var(--border);border-radius:10px; }
    .meal-name { font-size:.75rem;font-weight:600;color:var(--t2);margin-bottom:6px; }
    .meal-slider { width:100%;accent-color:var(--accent); }
    .meal-label { font-size:.6875rem;color:var(--t4);margin-top:2px;text-align:center; }

    .nap-row { display:flex;gap:10px;align-items:center; }
    .nap-input { padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;background:var(--s1);color:var(--t1);outline:none;width:110px; }
    .nap-input:focus { border-color:var(--accent); }

    .activity-tags { display:flex;gap:6px;flex-wrap:wrap; }
    .activity-tag { padding:5px 10px;border-radius:8px;font-size:.75rem;font-weight:500;border:1.5px solid var(--border);cursor:pointer;background:var(--card-bg);color:var(--t2);transition:all .15s; }
    .activity-tag.is-selected { background:var(--accent-bg);border-color:var(--accent);color:var(--accent); }

    .report-note { width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.875rem;background:var(--s1);color:var(--t1);resize:vertical;min-height:80px;font-family:inherit;outline:none;transition:border-color .15s; }
    .report-note:focus { border-color:var(--accent); }

    .ai-improve-btn { display:flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid var(--accent);border-radius:8px;background:var(--accent-bg);color:var(--accent);font-size:.8125rem;font-weight:600;cursor:pointer;transition:all .15s; }
    .ai-improve-btn:hover { background:var(--accent);color:#fff; }
    .ai-improve-btn svg { width:14px;height:14px; }

    .send-bar { display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap; }
    .channel-chip { display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s; }
    .channel-chip.is-on { border-color:var(--accent);background:var(--accent-bg);color:var(--accent); }

    /* Photo upload */
    .photo-upload-zone { border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden; }
    .photo-upload-zone:hover,.photo-upload-zone.drag-over { border-color:var(--accent);background:var(--accent-bg); }
    .photo-upload-zone input[type=file] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
    .photo-upload-icon { font-size:1.75rem;margin-bottom:6px; }
    .photo-upload-text { font-size:.8125rem;color:var(--t3);font-weight:500; }
    .photo-upload-sub  { font-size:.6875rem;color:var(--t4);margin-top:2px; }
    .photo-preview-grid { display:flex;gap:8px;flex-wrap:wrap;margin-top:12px; }
    .photo-thumb { position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);flex-shrink:0; }
    .photo-thumb img { width:100%;height:100%;object-fit:cover; }
    .photo-thumb-del { position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:.625rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1; }
    @media(max-width:540px){ .meal-grid{grid-template-columns:1fr 1fr} }

    .status-bar { display:flex;gap:12px;margin-bottom:20px;padding:12px 16px;background:var(--s1);border-radius:10px; }
    .status-pill { display:flex;align-items:center;gap:6px;font-size:.8125rem; }
  </style>
</head>
<body class="cl-body">
  <div class="cl-layout">
    <aside class="cl-sidebar" id="clSidebar"></aside>
    <div class="cl-main-wrap">
      <header class="cl-topbar" id="clTopbar"></header>
      <main class="cl-content">

        <div class="page-header">
          <div>
            <h1 class="page-title">Daily Reports</h1>
            <p class="page-sub">Build and send daily reports to parents</p>
          </div>
          <div class="page-actions">
            <button class="btn btn--ghost" onclick="sendAll()">Send All Reports</button>
          </div>
        </div>

        <!-- Status bar -->
        <div class="status-bar" id="statusBar"></div>

        <div class="report-layout">

          <!-- Child list -->
          <div class="report-list">
            <div class="report-list-head">
              <span class="report-list-title">Children Today</span>
              <span class="badge badge--green" id="sentCount">0 Sent</span>
            </div>
            <div id="reportList"></div>
          </div>

          <!-- Report builder -->
          <div class="report-builder" id="reportBuilder">
            <div style="text-align:center;padding:40px 20px;color:var(--t3)">
              <div style="font-size:2rem;margin-bottom:12px">📝</div>
              <div style="font-size:.9rem;font-weight:500">Select a child to build their daily report</div>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <div id="panelOverlay"></div>
  <script src="/client/daycare/shared/daycare-data.js"></script>
  <script src="/client/daycare/shared/client.js"></script>
  <script>
    CL.init({ page: 'daily-reports' });

    const reportState = {};
    DC.children.forEach(c => {
      reportState[c.id] = {
        mood: null, meals: { breakfast:3, lunch:3, snack:3 },
        napStart:'', napEnd:'', activities:[], note:'', sent:false, photos:[]
      };
    });

    const activities = ['Circle Time','Outdoor Play','Art & Craft','Story Time','Music','Science Play','Water Play','Sand Play'];
    const moods = [
      { emoji:'😄', label:'Great' },{ emoji:'😊', label:'Happy' },
      { emoji:'😐', label:'Okay' }, { emoji:'😢', label:'Sad' },
      { emoji:'😴', label:'Tired' },
    ];

    let activeChild = null;

    function renderList() {
      const present = DC.children.filter(c=>{
        const att = DC.attendance.find(a=>a.childId===c.id);
        return att?.status==='present'||att?.status==='late';
      });
      document.getElementById('reportList').innerHTML = present.map(c => {
        const st = reportState[c.id];
        const done = st.mood&&st.activities.length>0;
        return `
          <div class="report-item ${activeChild===c.id?'is-active':''}" onclick="selectChild('${c.id}')">
            <div class="av av-sm av--${CL.avatarColor(c.name)}">${c.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
            <div style="flex:1">
              <div class="report-item-name">${c.name}</div>
              <div class="report-item-sub">${c.room}</div>
            </div>
            ${st.sent
              ? '<span class="badge badge--green">Sent</span>'
              : done
                ? '<span class="badge badge--blue">Ready</span>'
                : '<span class="badge badge--grey">Pending</span>'}
          </div>`;
      }).join('') || '<div style="padding:20px;text-align:center;color:var(--t3);font-size:.875rem">No children checked in today.</div>';

      const sentN = Object.values(reportState).filter(s=>s.sent).length;
      document.getElementById('sentCount').textContent = `${sentN} Sent`;
    }

    function renderStatusBar() {
      const total = DC.children.length;
      const sent  = Object.values(reportState).filter(s=>s.sent).length;
      const ready = Object.values(reportState).filter(s=>!s.sent&&s.mood&&s.activities.length>0).length;
      document.getElementById('statusBar').innerHTML = `
        <div class="status-pill"><span style="width:8px;height:8px;border-radius:50%;background:#16A34A;display:inline-block"></span>${sent} sent</div>
        <div class="status-pill"><span style="width:8px;height:8px;border-radius:50%;background:#2563EB;display:inline-block"></span>${ready} ready</div>
        <div class="status-pill"><span style="width:8px;height:8px;border-radius:50%;background:#E2E8F0;display:inline-block"></span>${total-sent-ready} pending</div>`;
    }

    window.selectChild = (id) => {
      activeChild = id;
      renderList();
      renderBuilder();
    };

    function renderBuilder() {
      const c = DC.children.find(x=>x.id===activeChild);
      if(!c) return;
      const st = reportState[c.id];
      document.getElementById('reportBuilder').innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
          <div class="av av-md av--${CL.avatarColor(c.name)}">${c.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
          <div>
            <div style="font-size:1rem;font-weight:700;color:var(--t1)">${c.name}</div>
            <div style="font-size:.8rem;color:var(--t3)">${c.room} · ${c.keyTeacher}</div>
          </div>
          ${st.sent?'<span class="badge badge--green" style="margin-left:auto">Report Sent ✓</span>':''}
        </div>

        <div class="rb-section">
          <div class="rb-label">Today's Mood</div>
          <div class="mood-grid">
            ${moods.map(m=>`
              <div class="mood-opt ${st.mood===m.label?'is-selected':''}" onclick="setMood('${c.id}','${m.label}')">
                ${m.emoji}<span>${m.label}</span>
              </div>`).join('')}
          </div>
        </div>

        <div class="rb-section">
          <div class="rb-label">Meals</div>
          <div class="meal-grid">
            ${Object.entries(st.meals).map(([meal,val])=>`
              <div class="meal-item">
                <div class="meal-name">${meal.charAt(0).toUpperCase()+meal.slice(1)}</div>
                <input type="range" class="meal-slider" min="0" max="5" value="${val}" oninput="setMeal('${c.id}','${meal}',this.value);this.nextElementSibling.textContent=['None','Tiny','Half','Most','Full','All!'][this.value]">
                <div class="meal-label">${['None','Tiny','Half','Most','Full','All!'][val]}</div>
              </div>`).join('')}
          </div>
        </div>

        <div class="rb-section">
          <div class="rb-label">Nap Time</div>
          <div class="nap-row">
            <input type="time" class="nap-input" value="${st.napStart}" oninput="reportState['${c.id}'].napStart=this.value" placeholder="Start">
            <span style="color:var(--t4)">to</span>
            <input type="time" class="nap-input" value="${st.napEnd}" oninput="reportState['${c.id}'].napEnd=this.value" placeholder="End">
          </div>
        </div>

        <div class="rb-section">
          <div class="rb-label">Activities</div>
          <div class="activity-tags">
            ${activities.map(a=>`
              <span class="activity-tag ${st.activities.includes(a)?'is-selected':''}" onclick="toggleActivity('${c.id}','${a}')">${a}</span>`).join('')}
          </div>
        </div>

        <div class="rb-section">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div class="rb-label" style="margin:0">Note to Parent</div>
            <button class="ai-improve-btn" onclick="aiImprove('${c.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              AI Improve
            </button>
          </div>
          <textarea class="report-note" id="note-${c.id}" placeholder="Write a note about today…" oninput="reportState['${c.id}'].note=this.value">${st.note}</textarea>
        </div>

        <div class="rb-section">
          <div class="rb-label">📷 Photos from Today</div>
          <div class="photo-upload-zone" id="photoZone-${c.id}"
               ondragover="event.preventDefault();this.classList.add('drag-over')"
               ondragleave="this.classList.remove('drag-over')"
               ondrop="handlePhotoDrop(event,'${c.id}')">
            <input type="file" accept="image/*" multiple capture="environment"
                   onchange="handlePhotoFiles(this.files,'${c.id}')">
            <div class="photo-upload-icon">📸</div>
            <div class="photo-upload-text">Tap to add photos or drag & drop</div>
            <div class="photo-upload-sub">Camera works on mobile · JPG, PNG, HEIC · up to 5 photos</div>
          </div>
          <div class="photo-preview-grid" id="photoGrid-${c.id}">
            ${(st.photos||[]).map((url,i)=>`
              <div class="photo-thumb" id="pthumb-${c.id}-${i}">
                <img src="${url}" alt="Photo ${i+1}">
                <button class="photo-thumb-del" onclick="removePhoto('${c.id}',${i})" title="Remove">✕</button>
              </div>`).join('')}
          </div>
        </div>

        <div class="send-bar">
          <button class="btn btn--primary" style="flex:1" onclick="sendReport('${c.id}')">${st.sent?'Resend Report':'Send to Parent'}</button>
          <span class="channel-chip is-on">📱 WhatsApp</span>
          <span class="channel-chip is-on">📧 Email</span>
          ${(st.photos||[]).length>0?'<span class="channel-chip is-on">📷 '+st.photos.length+' photo'+(st.photos.length>1?'s':'')+'</span>':''}
        </div>`;
    }

    /* ── Photo handlers ── */
    function readFilesAsDataURLs(files, callback) {
      const results = [];
      let done = 0;
      Array.from(files).forEach(function(file, idx) {
        const reader = new FileReader();
        reader.onload = function(e) {
          results[idx] = e.target.result;
          done++;
          if (done === files.length) callback(results);
        };
        reader.readAsDataURL(file);
      });
      if (!files.length) callback([]);
    }

    window.handlePhotoFiles = function(files, childId) {
      const existing = reportState[childId].photos || [];
      const MAX = 5;
      const available = MAX - existing.length;
      const toAdd = Array.from(files).slice(0, available);
      if (!toAdd.length) { CL.showToast('Maximum 5 photos per report', 'info'); return; }
      readFilesAsDataURLs(toAdd, function(urls) {
        reportState[childId].photos = existing.concat(urls);
        renderBuilder();
        CL.showToast(urls.length + ' photo' + (urls.length > 1 ? 's' : '') + ' added', 'success');
      });
    };

    window.handlePhotoDrop = function(event, childId) {
      event.preventDefault();
      document.getElementById('photoZone-' + childId)?.classList.remove('drag-over');
      handlePhotoFiles(event.dataTransfer.files, childId);
    };

    window.removePhoto = function(childId, index) {
      reportState[childId].photos = (reportState[childId].photos || []).filter(function(_,i){ return i !== index; });
      renderBuilder();
    };

    window.setMood = (id,mood) => { reportState[id].mood=mood; renderBuilder(); };
    window.setMeal = (id,meal,val) => { reportState[id].meals[meal]=parseInt(val); };
    window.toggleActivity = (id,act) => {
      const arr = reportState[id].activities;
      const idx = arr.indexOf(act);
      idx===-1 ? arr.push(act) : arr.splice(idx,1);
      renderBuilder();
    };

    window.aiImprove = (id) => {
      const ta = document.getElementById(`note-${id}`);
      const c = DC.children.find(x=>x.id===id);
      const st = reportState[id];
      CL.showToast('AI improving note…','info');
      setTimeout(() => {
        const improved = `${c.name} had a wonderful day! They were in a ${(st.mood||'great').toLowerCase()} mood and really enjoyed ${st.activities.slice(0,2).join(' and ')||'our activities'}. They ate ${['','very little','a little','about half','most','almost all'][st.meals.lunch||3]} of their lunch. ${ta.value||'A lovely day overall — we are proud of them!'}`;
        ta.value = improved;
        reportState[id].note = improved;
        CL.showToast('Note improved by AI','success');
      }, 1000);
    };

    window.sendReport = (id) => {
      reportState[id].sent = true;
      renderList(); renderStatusBar(); renderBuilder();
      CL.showToast('Report sent to parent','success');
    };

    window.sendAll = () => {
      DC.children.forEach(c => { reportState[c.id].sent=true; });
      renderList(); renderStatusBar();
      if(activeChild) renderBuilder();
      CL.showToast(`All ${DC.children.length} reports sent!`, 'success');
    };

    renderList(); renderStatusBar();
  </script>
</body>
</html>
