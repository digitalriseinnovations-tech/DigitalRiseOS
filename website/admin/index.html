<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Digital Rise OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #040B18;
      --surface:   #071428;
      --surface2:  #091D3A;
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.14);
      --text:      #ffffff;
      --text-dim:  rgba(255,255,255,0.55);
      --text-mute: rgba(255,255,255,0.30);
      --accent:    #00A3FF;
      --green:     #14D19B;
      --amber:     #F59E0B;
      --red:       #EF4444;
      --purple:    #a78bfa;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ──────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,163,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 80%, rgba(20,209,155,0.07) 0%, transparent 60%),
        var(--bg);
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-hi);
      border-radius: 22px;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo__mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #0060cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
    }
    .login-logo__name { font-size: 16px; font-weight: 800; color: white; letter-spacing: -0.025em; }
    .login-logo__badge {
      font-size: 10px; font-weight: 700;
      background: rgba(0,163,255,0.15);
      border: 1px solid rgba(0,163,255,0.25);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
      letter-spacing: 0.05em;
    }

    .login-title { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-mute);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px; font-weight: 500;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,163,255,0.12); }
    .form-input::placeholder { color: var(--text-mute); }

    .login-btn {
      width: 100%;
      padding: 13px 24px;
      font-size: 14px; font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, #0070cc 100%);
      border: none; border-radius: 11px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(0,163,255,0.28);
      transition: box-shadow 0.2s, transform 0.2s;
      margin-top: 8px;
      font-family: inherit;
    }
    .login-btn:hover { box-shadow: 0 10px 30px rgba(0,163,255,0.40); transform: translateY(-1px); }

    .login-demo {
      margin-top: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .login-demo strong { color: rgba(255,255,255,0.70); }

    .login-error {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }

    /* ── DASHBOARD ─────────────────────────────── */
    #dashboard-screen { display: none; }

    .dash-header {
      background: rgba(7,20,40,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-header__logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 800;
      color: white; letter-spacing: -0.025em;
    }
    .dash-header__logo-mark {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #0060cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: white;
    }
    .dash-header__title {
      font-size: 13px; font-weight: 600;
      color: var(--text-dim);
      margin-left: 16px;
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }
    .dash-header__right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .dash-live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--green);
      background: rgba(20,209,155,0.10);
      border: 1px solid rgba(20,209,155,0.20);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .dash-live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

    .logout-btn {
      font-size: 12px; font-weight: 600;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--border-hi); }

    .dash-body { padding: 28px; max-width: 1280px; margin: 0 auto; }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
    }
    .kpi-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mute); margin-bottom: 8px; }
    .kpi-value { font-size: 1.875rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
    .kpi-sub   { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .kpi-card--blue   .kpi-value { color: var(--accent); }
    .kpi-card--green  .kpi-value { color: var(--green); }
    .kpi-card--amber  .kpi-value { color: var(--amber); }
    .kpi-card--red    .kpi-value { color: var(--red); }

    /* Filter bar */
    .leads-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 12px; font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border-hi); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .filter-btn--spam.active { background: var(--red); border-color: var(--red); }
    .filter-btn--green.active { background: var(--green); border-color: var(--green); color: #001a0e; }

    .leads-search {
      margin-left: auto;
      padding: 7px 14px;
      font-size: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      width: 200px;
      transition: border-color 0.2s;
    }
    .leads-search::placeholder { color: var(--text-mute); }
    .leads-search:focus { border-color: var(--border-hi); }

    /* Leads table */
    .leads-table-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .leads-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .leads-table th {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-mute);
      padding: 13px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .leads-table td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
      color: rgba(255,255,255,0.80);
    }
    .leads-table tr:last-child td { border-bottom: none; }
    .leads-table tr:hover td { background: rgba(255,255,255,0.02); }

    .lead-name { font-weight: 600; color: white; }
    .lead-phone { color: var(--text-dim); font-size: 12px; }
    .lead-source {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .lead-source--web     { background: rgba(0,163,255,0.12); color: var(--accent); }
    .lead-source--google  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.70); }
    .lead-source--fb      { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .lead-source--wa      { background: rgba(20,209,155,0.12); color: var(--green); }
    .lead-source--ref     { background: rgba(167,139,250,0.12); color: var(--purple); }

    .score-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 110px; }
    .score-bar {
      flex: 1; height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar__fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .score-num { font-size: 11px; font-weight: 700; min-width: 26px; text-align: right; }

    .score--high .score-bar__fill { background: var(--green); }
    .score--high .score-num       { color: var(--green); }
    .score--mid  .score-bar__fill { background: var(--amber); }
    .score--mid  .score-num       { color: var(--amber); }
    .score--low  .score-bar__fill { background: var(--red); }
    .score--low  .score-num       { color: var(--red); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      white-space: nowrap;
    }
    .status-badge--new      { background: rgba(0,163,255,0.12); color: var(--accent); }
    .status-badge--contacted{ background: rgba(245,158,11,0.12); color: var(--amber); }
    .status-badge--booked   { background: rgba(20,209,155,0.12); color: var(--green); }
    .status-badge--spam     { background: rgba(239,68,68,0.10); color: var(--red); }
    .status-badge--closed   { background: rgba(255,255,255,0.07); color: var(--text-dim); }

    .action-btns { display: flex; align-items: center; gap: 6px; }
    .action-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.2s;
      font-size: 13px;
    }
    .action-btn:hover { background: rgba(255,255,255,0.10); color: white; border-color: var(--border-hi); }
    .action-btn--wa:hover { background: rgba(20,209,155,0.15); color: var(--green); border-color: rgba(20,209,155,0.25); }
    .action-btn--book:hover { background: rgba(0,163,255,0.15); color: var(--accent); border-color: rgba(0,163,255,0.25); }

    .spam-row td { opacity: 0.55; }
    .spam-row:hover td { opacity: 0.75; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-mute);
      font-size: 13px;
    }

    /* Pagination */
    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-mute);
    }

    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .leads-table th:nth-child(5),
      .leads-table td:nth-child(5),
      .leads-table th:nth-child(7),
      .leads-table td:nth-child(7) { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo__mark">D</div>
      <div class="login-logo__name">Digital Rise OS</div>
      <div class="login-logo__badge">ADMIN</div>
    </div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your leads dashboard</div>

    <div class="login-error" id="login-error">Invalid email or password. Please try again.</div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="admin@digitalriseos.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Sign In to Dashboard</button>

    <div class="login-demo">
      <strong>Demo credentials</strong><br>
      Email: <strong>admin@digitalriseos.com</strong><br>
      Password: <strong>DrOS2024!</strong>
    </div>
  </div>
</div>


<!-- ══════════════════ DASHBOARD SCREEN ══════════════════ -->
<div id="dashboard-screen">

  <header class="dash-header">
    <div class="dash-header__logo">
      <div class="dash-header__logo-mark">D</div>
      Digital Rise OS
    </div>
    <div class="dash-header__title">Leads Dashboard</div>
    <div class="dash-header__right">
      <div class="dash-live-badge"><div class="dash-live-dot"></div>Live</div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="dash-body">

    <!-- KPIs -->
    <div class="kpi-row" id="kpi-row">
      <!-- Populated by JS -->
    </div>

    <!-- Filter + Search toolbar -->
    <div class="leads-toolbar">
      <button class="filter-btn active" data-filter="all">All Leads</button>
      <button class="filter-btn" data-filter="new">New</button>
      <button class="filter-btn filter-btn--green" data-filter="contacted">Contacted</button>
      <button class="filter-btn filter-btn--green" data-filter="booked">Booked</button>
      <button class="filter-btn filter-btn--spam" data-filter="spam">Spam Blocked</button>
      <input class="leads-search" type="text" id="leads-search" placeholder="Search name, phone...">
    </div>

    <!-- Leads table -->
    <div class="leads-table-wrap">
      <table class="leads-table" id="leads-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Source</th>
            <th>Industry</th>
            <th>Quality Score</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
      <div class="table-footer" id="table-footer"></div>
    </div>

  </div>
</div>


<script>
(function () {
  'use strict';

  /* ── Demo credentials ── */
  const VALID_EMAIL    = 'admin@digitalriseos.com';
  const VALID_PASSWORD = 'DrOS2024!';

  /* ── Sample leads data ── */
  const LEADS = [
    { id:1,  time:'2 min ago',   name:'Mike Johnson',    phone:'07712 345678', source:'web',    industry:'Trades',      score:91, status:'new',       notes:'Boiler replacement quote' },
    { id:2,  time:'8 min ago',   name:'Sarah Lewis',     phone:'07823 456789', source:'google', industry:'Dental',      score:88, status:'contacted',  notes:'Check-up appointment' },
    { id:3,  time:'14 min ago',  name:'Amy Parker',      phone:'07934 567890', source:'fb',     industry:'Fitness',     score:76, status:'booked',     notes:'HIIT class booking' },
    { id:4,  time:'22 min ago',  name:'Tom Richards',    phone:'07845 678901', source:'wa',     industry:'Restaurant',  score:83, status:'new',        notes:'Table for 4 Saturday' },
    { id:5,  time:'31 min ago',  name:'Claire Hughes',   phone:'07756 789012', source:'google', industry:'Salon',       score:95, status:'booked',     notes:'Cut & colour Saturday' },
    { id:6,  time:'45 min ago',  name:'James Patel',     phone:'07667 890123', source:'ref',    industry:'Trades',      score:79, status:'contacted',  notes:'Garden landscaping quote' },
    { id:7,  time:'1 hr ago',    name:'Emma Watson',     phone:'07578 901234', source:'web',    industry:'Childcare',   score:85, status:'new',        notes:'Nursery tour request' },
    { id:8,  time:'1 hr ago',    name:'Contact Form Spam',phone:'00000 000000',source:'web',   industry:'Unknown',     score:12, status:'spam',       notes:'Missing fields, VPN IP, no real phone' },
    { id:9,  time:'2 hrs ago',   name:'David Brown',     phone:'07489 012345', source:'google', industry:'Dental',      score:87, status:'booked',     notes:'Teeth whitening consultation' },
    { id:10, time:'2 hrs ago',   name:'Priya Sharma',    phone:'07390 123456', source:'fb',     industry:'Fitness',     score:72, status:'contacted',  notes:'Yoga class enquiry' },
    { id:11, time:'3 hrs ago',   name:'Test Lead Bot',   phone:'07777 777777', source:'web',    industry:'Unknown',     score:18, status:'spam',       notes:'Duplicate submission, bot pattern detected' },
    { id:12, time:'4 hrs ago',   name:'Kevin Walsh',     phone:'07201 234567', source:'wa',     industry:'Restaurant',  score:90, status:'booked',     notes:'Private dining enquiry — £800' },
  ];

  /* ── Auth ── */
  const loginScreen    = document.getElementById('login-screen');
  const dashScreen     = document.getElementById('dashboard-screen');
  const loginError     = document.getElementById('login-error');
  const emailInput     = document.getElementById('email');
  const passwordInput  = document.getElementById('password');
  const loginBtn       = document.getElementById('login-btn');
  const logoutBtn      = document.getElementById('logout-btn');

  function showDashboard() {
    loginScreen.style.display  = 'none';
    dashScreen.style.display   = 'block';
    renderKPIs();
    renderLeads('all');
  }
  function showLogin() {
    dashScreen.style.display  = 'none';
    loginScreen.style.display = 'flex';
    sessionStorage.removeItem('dros_admin');
  }

  if (sessionStorage.getItem('dros_admin') === '1') {
    showDashboard();
  }

  loginBtn.addEventListener('click', () => {
    const email = emailInput.value.trim();
    const pass  = passwordInput.value;
    if (email === VALID_EMAIL && pass === VALID_PASSWORD) {
      sessionStorage.setItem('dros_admin', '1');
      loginError.style.display = 'none';
      showDashboard();
    } else {
      loginError.style.display = 'block';
      passwordInput.value = '';
    }
  });
  [emailInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
  });
  logoutBtn.addEventListener('click', showLogin);

  /* ── KPIs ── */
  function renderKPIs() {
    const total     = LEADS.length;
    const verified  = LEADS.filter(l => l.score >= 60).length;
    const spamCount = LEADS.filter(l => l.score < 40).length;
    const booked    = LEADS.filter(l => l.status === 'booked').length;

    document.getElementById('kpi-row').innerHTML = `
      <div class="kpi-card kpi-card--blue">
        <div class="kpi-label">Total Leads</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">Today · All sources</div>
      </div>
      <div class="kpi-card kpi-card--green">
        <div class="kpi-label">Verified Leads</div>
        <div class="kpi-value">${verified}</div>
        <div class="kpi-sub">Quality score ≥ 60</div>
      </div>
      <div class="kpi-card kpi-card--amber">
        <div class="kpi-label">Booked Today</div>
        <div class="kpi-value">${booked}</div>
        <div class="kpi-sub">Appointments confirmed</div>
      </div>
      <div class="kpi-card kpi-card--red">
        <div class="kpi-label">Spam Blocked</div>
        <div class="kpi-value">${spamCount}</div>
        <div class="kpi-sub">Auto-filtered, not shown</div>
      </div>`;
  }

  /* ── Leads table ── */
  let activeFilter = 'all';
  let searchQuery  = '';

  function scoreClass(s) {
    if (s >= 70) return 'high';
    if (s >= 40) return 'mid';
    return 'low';
  }

  function sourceHTML(src) {
    const map = {
      web:    ['web',    'Website'],
      google: ['google', 'Google'],
      fb:     ['fb',     'Facebook'],
      wa:     ['wa',     'WhatsApp'],
      ref:    ['ref',    'Referral'],
    };
    const [cls, label] = map[src] || ['web', src];
    return `<span class="lead-source lead-source--${cls}">${label}</span>`;
  }

  function statusHTML(s) {
    const map = {
      new:       ['new',       'New'],
      contacted: ['contacted', 'Contacted'],
      booked:    ['booked',    '✓ Booked'],
      spam:      ['spam',      '⚠ Spam'],
      closed:    ['closed',    'Closed'],
    };
    const [cls, label] = map[s] || ['new', s];
    return `<span class="status-badge status-badge--${cls}">${label}</span>`;
  }

  function renderLeads(filter) {
    activeFilter = filter;

    /* update filter buttons */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });

    let list = LEADS;

    /* filter */
    if (filter === 'spam') {
      list = list.filter(l => l.score < 40);
    } else if (filter === 'all') {
      list = list.filter(l => l.score >= 40); /* hide spam from main view */
    } else {
      list = list.filter(l => l.score >= 40 && l.status === filter);
    }

    /* search */
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(l =>
        l.name.toLowerCase().includes(q) ||
        l.phone.includes(q) ||
        l.industry.toLowerCase().includes(q)
      );
    }

    const tbody = document.getElementById('leads-tbody');

    if (list.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">No leads match this filter.</div></td></tr>`;
      document.getElementById('table-footer').textContent = '0 leads';
      return;
    }

    tbody.innerHTML = list.map(l => {
      const sc = scoreClass(l.score);
      const isSpam = l.score < 40;
      return `
        <tr class="${isSpam ? 'spam-row' : ''}">
          <td style="color:var(--text-mute);font-size:11px;white-space:nowrap;">${l.time}</td>
          <td>
            <div class="lead-name">${l.name}</div>
            <div class="lead-phone">${l.notes}</div>
          </td>
          <td style="white-space:nowrap;">${l.phone}</td>
          <td>${sourceHTML(l.source)}</td>
          <td style="color:var(--text-dim);">${l.industry}</td>
          <td>
            <div class="score-bar-wrap score--${sc}">
              <div class="score-bar"><div class="score-bar__fill" style="width:${l.score}%;"></div></div>
              <div class="score-num">${l.score}</div>
            </div>
          </td>
          <td>${statusHTML(l.status)}</td>
          <td>
            <div class="action-btns">
              <button class="action-btn action-btn--wa" title="Send WhatsApp">💬</button>
              <button class="action-btn action-btn--book" title="Book appointment">📅</button>
              <button class="action-btn" title="View details">👁</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    document.getElementById('table-footer').textContent =
      `${list.length} lead${list.length !== 1 ? 's' : ''} ${filter !== 'all' ? `· ${filter}` : '· Spam auto-filtered'}`;
  }

  /* Filter buttons */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => renderLeads(btn.dataset.filter));
  });

  /* Search */
  document.getElementById('leads-search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderLeads(activeFilter);
  });

})();
</script>
</body>
</html>
